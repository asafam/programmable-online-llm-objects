# LNL OpenClaw Worker Pool — docker-compose.yml
#
# 48 services total:
#   single-worker-1  .. single-worker-24  (single-agent evals)
#   multi-worker-1   .. multi-worker-24   (multi-agent evals)
#
# Port layout (host → container):
#   18789 / 18888   : RESERVED — local LNL runtime + mock/server.py (do not bind here)
#   single-worker-N : gateway 19788+N:18789 / mock 19887+N:18888
#   multi-worker-N  : gateway 20788+N:18789 / mock 20887+N:18888
#
# single-worker port table:
#   single-worker-1  : 19789 / 19888
#   single-worker-2  : 19790 / 19889
#   single-worker-3  : 19791 / 19890
#   single-worker-4  : 19792 / 19891
#   single-worker-5  : 19793 / 19892
#   single-worker-6  : 19794 / 19893
#   single-worker-7  : 19795 / 19894
#   single-worker-8  : 19796 / 19895
#   single-worker-9  : 19797 / 19896
#   single-worker-10 : 19798 / 19897
#   single-worker-11 : 19799 / 19898
#   single-worker-12 : 19800 / 19899
#   single-worker-13 : 19801 / 19900
#   single-worker-14 : 19802 / 19901
#   single-worker-15 : 19803 / 19902
#   single-worker-16 : 19804 / 19903
#   single-worker-17 : 19805 / 19904
#   single-worker-18 : 19806 / 19905
#   single-worker-19 : 19807 / 19906
#   single-worker-20 : 19808 / 19907
#   single-worker-21 : 19809 / 19908
#   single-worker-22 : 19810 / 19909
#   single-worker-23 : 19811 / 19910
#   single-worker-24 : 19812 / 19911
#
# multi-worker port table:
#   multi-worker-1   : 20789 / 20888
#   multi-worker-2   : 20790 / 20889
#   multi-worker-3   : 20791 / 20890
#   multi-worker-4   : 20792 / 20891
#   multi-worker-5   : 20793 / 20892
#   multi-worker-6   : 20794 / 20893
#   multi-worker-7   : 20795 / 20894
#   multi-worker-8   : 20796 / 20895
#   multi-worker-9   : 20797 / 20896
#   multi-worker-10  : 20798 / 20897
#   multi-worker-11  : 20799 / 20898
#   multi-worker-12  : 20800 / 20899
#   multi-worker-13  : 20801 / 20900
#   multi-worker-14  : 20802 / 20901
#   multi-worker-15  : 20803 / 20902
#   multi-worker-16  : 20804 / 20903
#   multi-worker-17  : 20805 / 20904
#   multi-worker-18  : 20806 / 20905
#   multi-worker-19  : 20807 / 20906
#   multi-worker-20  : 20808 / 20907
#   multi-worker-21  : 20809 / 20908
#   multi-worker-22  : 20810 / 20909
#   multi-worker-23  : 20811 / 20910
#   multi-worker-24  : 20812 / 20911

name: lnl-openclaw-pool

x-worker-base: &worker-base
  image: lnl-openclaw-worker
  # Public resolvers: the host router's DNS intermittently fails mid-run
  # ([Errno -2] Name or service not known on the Azure endpoint at event ~23
  # of an otherwise-perfect baseline) — workers shouldn't depend on it.
  dns:
    - 1.1.1.1
    - 8.8.8.8
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: "no"
  env_file:
    - ../.env
  environment:
    LNL_MOCK_SERVER_URL: "http://localhost:18888"
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://localhost:18888/health"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 15s

services:

  # ---------------------------------------------------------------------------
  # single-worker-1 .. single-worker-24
  # ---------------------------------------------------------------------------

  single-worker-1:
    <<: *worker-base
    container_name: lnl-oc-single-worker-1
    hostname: lnl-single-worker-1
    environment:
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN_1:-changeme-single-worker-1}"
      LNL_MOCK_SERVER_URL: "http://localhost:18888"
      OPENCLAW_DISABLE_BONJOUR: "1"
    ports:
      - "19789:18789"
      - "19888:18888"
    volumes:
      - type: bind
        source: "${LNL_POOL_DATA_DIR:-/tmp/lnl-pool}/single-worker-1"
        target: /home/node/.openclaw
        bind:
          create_host_path: true

  single-worker-2:
