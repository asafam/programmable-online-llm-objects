# LNL OpenClaw Worker Pool — multi-agent, 2 workers
#
# Use with: ./docker/start-pool.sh --type multi --workers 2

workers:
  - name: multi-worker-1
    container_name: lnl-oc-multi-worker-1
    gateway_url: ws://localhost:20789
    mock_server_url: http://localhost:20888
    data_dir: /tmp/lnl-pool/multi-worker-1

  - name: multi-worker-2
    container_name: lnl-oc-multi-worker-2
    gateway_url: ws://localhost:20790
    mock_server_url: http://localhost:20889
    data_dir: /tmp/lnl-pool/multi-worker-2
