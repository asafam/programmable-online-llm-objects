prompt: |
  # Task: Instantiate Automation Template

  You are creating a concrete instance of an automation template as a distributed LLM-object system.

  ---

  ## Template

  {TEMPLATE}

  ---

  ## Your Task

  Generate exactly **{SAMPLES_COUNT}** sample(s). This is a two-phase task. Complete Phase 1 (object identification) before Phase 2 (step writing).

  **Instantiate all placeholders**:
  - "a designated channel" → a specific channel name
  - "a team" → a specific team name
  - "a team member" → a specific person's role within the team
  - "your [anything]" → a specific name
  - "predefined options" → list the actual options
  - "X or Y" → pick one

  **Do not**:
  - Instantiate individual people names unless explicitly a placeholder for a person
  - Add examples, including "e.g.", "like", or "such as"
  - Invent unnecessary details
  - Expand on the original meaning

  ---

  ## Object-Style Rewriting

  You are a system architect designing a distributed object system. Rewrite the steps to describe program objects and their interactions.

  Each object is an **LLM-object with its own internal state and behavior**. An object holds all the data it needs to do its job — it does not need a separate object to store data for it.

  ### Object categories

  Use these categories as conceptual framing — they guide how you design objects, but `category` is not a schema field.

  1. **Service objects** — represent external systems the automation interacts with (databases, messaging platforms, CRM, directory services, email, etc.). Named by brand or function as a slug (e.g., `slack`, `active-directory`, `crm`). One object per external system — never split a system into separate read and write objects. Service objects come in two flavors:
     - **Read services** have seeded reference data. Their behavior is to respond to queries about their data. Read services MUST reply with the requested data — the reply is the only way the caller receives the answer back. Read services MUST set `seed_data` (field 9) with concrete data for the scenario.
     - **Write services** record what they receive and have initially empty state. Their state becomes the audit trail. Write services set `reply` to empty in their responses — they are fire-and-forget sinks. Their `behavior` field should end with: "Do not reply to incoming messages." IMPORTANT: "Do not reply" means the `reply` field in the JSON response is empty — it does NOT mean removing peer declarations. **Entry-point write services (those with `event_sources`) MUST still declare the business logic object as a peer.** Without this peer, the trigger dead-ends at the entry-point and the automation never runs. Example: a CRM service that receives new record webhooks must have a peer pointing to the domain logic object that processes them.
     Both reads and writes happen through normal peer messages — no special mechanism needed.
  2. **Business logic objects** — one per distinct area of responsibility that involves decision-making, processing, routing, or orchestration. Named as domain slugs (nouns), not actions (verbs). Each business logic object owns its own business data and state internally. It interacts with external systems by sending messages to service objects via peer declarations.

  Each domain gets exactly one object. Never split a domain into multiple objects (e.g., "FAQ Table" + "FAQ Logic" → one `faq` object; "Retrospectives" + "RetroDataStore" → one `retrospectives` object). Never name objects by implementation role (Table, Store, Logic, Handler, Manager, Processor) — name them after the domain they represent. Look at the template `name` field for the core domain concept.

  An object is only valid if it has independently modifiable behavior — its own way of reading, writing, formatting, or processing that can change without affecting other objects. If an object has no such behavior, fold it into the object that uses it.

  ### Phase 1 — Object identification (populate the `objects` array)

  Read all `raw_steps` first. Read the template `name` field to identify the core domain concept. Use it to guide object naming and grouping. Each business logic object should represent a complete domain (e.g., `retrospectives` not `incident-analyzer`). It owns its own data and logic — never create a separate object just to store data for it or just to run one step of its logic.

  #### Mandatory object checklist

  Before writing any objects, answer these questions about the automation:

  1. **What external system receives the trigger?** → You need an entry-point service object with `event_sources` AND at least one peer pointing to the business logic object. Without the peer, the trigger dead-ends.
  2. **What decisions or routing logic is required?** → You need one business logic object per domain. If the automation classifies, routes, approves, assigns, or orchestrates, there MUST be a business logic object.
  3. **What data does the business logic object need to look up?** → For each lookup (org charts, catalogs, policy tables, user directories), you need a read service object with non-empty `seed_data`.
  4. **What external outputs does the automation produce?** → For each output channel (email, Slack, Jira, database write, etc.), you need a write service object. If the automation sends an email, there MUST be an `email` (or equivalent) write service object.

  Every object must have peers wired to form a complete chain from trigger → business logic → output. An object with no peers and no downstream effect is incomplete.

  Then identify every object needed. For each object, provide:

  1. `object_id` — slug format (lowercase, hyphens, e.g., `support-triage`, `slack`)
  2. `role` — one sentence describing what the object is and does
  3. `state_description` — what data/state the object tracks (e.g., "Tracks open tickets with priority, assignee, and status")
  4. `behavior` — domain logic rules only, using when/then patterns. Do NOT include communication instructions here — peers handle that. Example: "When a new request arrives, classify by urgency. When urgency is high, escalate immediately. When a request is unresolved for 24h, flag for review."
  5. `peers` — **directional**: only objects this one SENDS messages to. Each peer has:
     - `object_id` — slug of the target object
     - `relationship` — communication contract describing WHAT and WHEN to send (e.g., "Notify with item details and priority when a new unresolved request arrives")
     Interactions with external systems are modeled as peers pointing to service objects. This replaces skills like "look up X" — the lookup is a message to a service object.
     **Entry-point service objects must have peers too.** If a service object has `event_sources` and its events need processing by a business logic object, it MUST declare that business logic object as a peer. Without this peer, incoming events dead-end at the service object and never reach the processor. Example: if an external system receives a webhook and a domain object handles the workflow, then the external system object needs a peer pointing to that domain object. Similarly, if the external system receives response/callback events the domain object must act on, it too needs that peer. Peers are directional — trace the flow from every event source to the object that processes it.
  6. `skills` — purely internal capabilities that do NOT require external system calls (e.g., `calculate-totals`, `format-report`). If a capability involves reading from or writing to an external system, model it as a peer to a service object instead. Omit if none.
  7. `subscriptions` — topics this object listens to (e.g., `new-ticket`, `escalation-needed`). Omit if none.
  8. `event_sources` — external triggers this object receives from outside the system boundary (e.g., `Slack webhook: incoming messages`, `HubSpot: new quote created`). Only for service objects or entry-point objects that receive external triggers. Omit if none.
  9. `seed_data` — **read services only**: static reference data as a JSON object. This is immutable ground truth the object answers queries from — it is NOT the object's mutable state. Use specific names, values, and rules that match the scenario — invent realistic but unique names for this scenario. The structure depends on what the object stores: an org chart stores employees and reporting lines; a product catalog stores items with prices and categories; a policy table stores rules and thresholds. Whatever the object's `state_description` says it tracks, populate it with concrete values. Write services and business logic objects leave this as `{}`. If omitted, the object starts with no knowledge and will hallucinate answers.

  Before finalizing, verify:
  - Every entry-point object with `event_sources` has at least one peer (no dead-ends)
  - Every lookup ("find the manager", "check the policy") is served by a read service with non-empty `seed_data`
  - Every output action ("send email", "post to Slack") is served by a write service object
  - The automation has at least one business logic object if any decisions, routing, or processing is required

  Output all objects in the `objects` array before writing any steps.

  ### Phase 2 — Step writing (populate the `steps` array)

  Steps are **external triggers only** — events that arrive from outside the system and start the automation. They are NOT a trace of the internal workflow.

  Once a trigger fires, the objects take over: each object's behavior and peer declarations determine what happens next. The message bus chains messages automatically. You do not write steps for internal actions.

  Ask yourself: "What external event causes this automation to run?" Write only that.

  Each step is a JSON object with these fields:
  - `target` — the `object_id` of the LLM-object that receives the external trigger
  - `source` — the external system originating this trigger (e.g. `"slack"`, `"hubspot"`, `"email"`, `"webhook"`). Use `"__external__"` only if the source is truly unknown.
  - `text` — the natural language content of the trigger (what arrived from outside)
  - `expect` — the expected outcome when the system runs with **no modifications applied**:
    - `action` — specific, observable terminal output: what was sent, recorded, or produced, and to whom
    - `reason` — the rule or peer relationship that produces it

  **Step text content**:
  Use descriptive names for people, items, and roles — not opaque identifiers (e.g., use "James Brown, Account Executive" not "SR-445"). Read service objects look up entities by name/role, so the names in step text must match entries in the seed_data of read services. When you write a step referencing a person or item, ensure an entry for that person or item exists in the relevant read service's seed_data.

  **What IS a step**:
  - An external system creates a record that triggers the automation (e.g., a new item submitted via webhook)
  - An inbound message that the system must act on (e.g., a message received on a platform the system monitors)
  - A scheduled or time-based trigger (e.g., a daily check or heartbeat)

  **What is NOT a step** (these are internal — handled by object behavior and peer chaining):
  - An object querying another object for data
  - An object sending a notification, email, or downstream message
  - An object updating a record in response to another object
  - Any action that is a consequence of a prior step

  **Most automations have only 1–2 steps.** If you find yourself writing more, stop and ask whether each step is truly an independent external trigger or an internal consequence of a prior one. Internal consequences are never steps.

  **Correctness**:
  - Every `target` must be a valid `object_id` from the `objects` array
  - Every `target` must be an object whose `event_sources` list is non-empty — only objects that listen for external triggers can receive steps
  - The `text` must contain only information that arrives with the external trigger — not data the objects will look up themselves
  - Steps run sequentially on a shared runtime and share state. Each step's side effects carry forward into all subsequent steps. Before writing `expect` for any step, ask: "Have prior steps already consumed or resolved the state this step depends on?" If yes, **omit `expect`** — the outcome is no longer deterministic.
  - If step N creates a record and step N+1 resolves it, step N+2 (e.g., "check for unresolved records") will find nothing. That step's `expect` must reflect the resolved state, or be omitted entirely.
  - Omit `expect` entirely when the outcome depends on transient state (scheduled checks, polls, heartbeats) or when a prior step has already resolved the relevant items.
