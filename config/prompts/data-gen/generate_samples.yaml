prompt: |
  # Task: Instantiate Automation Template

  You are creating a concrete instance of an automation template as a distributed LLM-object system.

  ---

  ## Template

  {TEMPLATE}

  ---

  ## Your Task

  This is a two-phase task. Complete Phase 1 (object identification) before Phase 2 (step writing).

  **Instantiate all placeholders**:
  - "a designated channel" → a specific channel name
  - "a team" → a specific team name
  - "a team member" → a specific person's role within the team
  - "your [anything]" → a specific name
  - "predefined options" → list the actual options
  - "X or Y" → pick one

  **Do not**:
  - Instantiate individual people names unless explicitly a placeholder for a person
  - Add examples, including "e.g.", "like", or "such as"
  - Invent unnecessary details
  - Expand on the original meaning

  ---

  ## Object-Style Rewriting

  You are a system architect designing a distributed object system. Rewrite the steps to describe program objects and their interactions.

  Each object is an **LLM-object with its own internal state and behavior**. An object holds all the data it needs to do its job — it does not need a separate object to store data for it.

  ### Object categories

  Use these categories as conceptual framing — they guide how you design objects, but `category` is not a schema field.

  1. **Service objects** — represent external systems the automation interacts with (Active Directory, Slack, HubSpot, databases, email, etc.). Named by brand or function as a slug (e.g., `slack`, `active-directory`, `hubspot`). One object per external system — never split a system into separate read and write objects. Service objects come in two flavors:
     - **Read services** have seeded state containing reference data (e.g., `active-directory` with `state_description: "Users: Sarah (manager: Bob, department: Engineering), ..."`). Their behavior is to respond to queries about their data.
     - **Write services** have initially empty state and record what they receive (e.g., `slack` with behavior: "Record all received messages in state"). Their state becomes the audit trail.
     Both reads and writes happen through normal peer messages — no special mechanism needed.
  2. **Business logic objects** — one per distinct area of responsibility that involves decision-making, processing, routing, or orchestration. Named as domain slugs (nouns), not actions (verbs) (e.g., `support-triage`, `ticket-router`). Each business logic object owns its own business data and state internally. It interacts with external systems by sending messages to service objects via peer declarations.

  Each domain gets exactly one object. Never split a domain into multiple objects (e.g., "FAQ Table" + "FAQ Logic" should be one `faq` object; "Retrospectives" + "RetroDataStore" should be one `retrospectives` object). Never name objects by implementation role (Table, Store, Logic, Handler, Manager, Processor) — name them after the domain they represent. Look at the template `name` field for the core domain concept.

  An object is only valid if it has independently modifiable behavior — its own way of reading, writing, formatting, or processing that can change without affecting other objects. If an object has no such behavior, fold it into the object that uses it.

  ### Phase 1 — Object identification (populate the `objects` array)

  Read all `raw_steps` first. Read the template `name` field to identify the core domain concept. Use it to guide object naming and grouping. Each business logic object should represent a complete domain (e.g., `retrospectives` not `incident-analyzer`). It owns its own data and logic — never create a separate object just to store data for it or just to run one step of its logic.

  Then identify every object needed. For each object, provide:

  1. `object_id` — slug format (lowercase, hyphens, e.g., `support-triage`, `slack`)
  2. `role` — one sentence describing what the object is and does
  3. `state_description` — what data/state the object tracks (e.g., "Tracks open tickets with priority, assignee, and status")
  4. `behavior` — domain logic rules only, using when/then patterns. Do NOT include communication instructions here — peers handle that. Example: "When a new request arrives, classify by urgency. When urgency is high, escalate immediately. When a request is unresolved for 24h, flag for review."
  5. `peers` — **directional**: only objects this one SENDS messages to. Each peer has:
     - `object_id` — slug of the target object
     - `relationship` — communication contract describing WHAT and WHEN to send (e.g., "Notify with ticket details and priority when a new unresolved request arrives")
     Interactions with external systems are modeled as peers pointing to service objects (e.g., `{object_id: "active-directory", relationship: "Query for employee org structure when approval routing is needed"}`). This replaces skills like "look up manager" — the lookup is a message to a service object.
  6. `skills` — purely internal capabilities that do NOT require external system calls (e.g., `calculate-totals`, `format-report`). If a capability involves reading from or writing to an external system, model it as a peer to a service object instead. Omit if none.
  7. `subscriptions` — topics this object listens to (e.g., `new-ticket`, `escalation-needed`). Omit if none.
  8. `event_sources` — external triggers this object receives from outside the system boundary (e.g., `Slack webhook: incoming messages`, `HubSpot: new quote created`). Only for service objects or entry-point objects that receive external triggers. Omit if none.

  Output all objects in the `objects` array before writing any steps.

  ### Phase 2 — Step writing (populate the `steps` array)

  Steps are **external triggers only** — events that arrive from outside the system and start the automation. They are NOT a trace of the internal workflow.

  Once a trigger fires, the objects take over: each object's behavior and peer declarations determine what happens next. The message bus chains messages automatically. You do not write steps for internal actions.

  Ask yourself: "What external event causes this automation to run?" Write only that.

  Each step is a JSON object with three fields:
  - `target` — the `object_id` of the LLM-object that receives the external trigger
  - `text` — the natural language content of the trigger (what arrived from outside)
  - `expect` — the expected outcome when the system runs with **no modifications applied**:
    - `action` — specific, observable terminal output (e.g., "Approval email sent to Sarah Chen")
    - `reason` — the rule or peer relationship that produces it (e.g., "org-directory rule: discount >10% requires manager approval")

  **What IS a step**:
  - A new record created in an external system → `{"target": "hubspot", "text": "New quote Q-2847 created by John Smith: 15% discount and extended payment terms requested", "expect": {"action": "Approval email sent to Sarah Chen (manager)", "reason": "org-directory rule: discount >10% requires manager approval"}}`
  - An inbound message or webhook → `{"target": "slack", "text": "Message in #support: our integration is broken, urgent", "expect": {"action": "Support ticket created and assigned to on-call engineer", "reason": "support-triage behavior: urgent messages trigger immediate ticket creation"}}`
  - A scheduled or time-based event → `{"target": "quote-approvals", "text": "Daily check: identify quotes pending approval for more than 24 hours"}`

  **What is NOT a step** (these are internal — handled by object behavior and peer chaining):
  - An object querying another object (e.g., looking up a manager in org-directory)
  - An object sending a notification or email
  - An object updating a record in response to another object
  - Any action that is a consequence of a prior step

  **Most automations have only 1–2 steps.** If you find yourself writing more, stop and ask whether each step is truly an independent external trigger or an internal consequence of a prior one. Internal consequences are never steps.

  **Correctness**:
  - Every `target` must be a valid `object_id` from the `objects` array
  - Every `target` must be an object whose `event_sources` list is non-empty — only objects that listen for external triggers can receive steps
  - The `text` must contain only information that arrives with the external trigger — not data the objects will look up themselves
