user_prompt: |
  # Task: Generate Test Scenarios

  You are designing realistic test scenarios for an automation. Generate scenarios 
  that feel like actual business operations, not contrived examples.

  ---

  ## Sample

  {SAMPLE}

  ---

  ## Your Task

  Generate scenarios. Each scenario contains:
  - One or more modifications (natural language rule changes)
  - Events that validate the modifications

  **Critical**: Modifications and events must be grounded in the actual objects and their behaviors.
  Only reference entities, rules, and logic that exist in the instance.
  Events must be the same kind of external trigger as the sample's `steps` — not internal consequences.

  Do not invent concepts (like dollar thresholds) that are not part of the automation.

  ## Object Definitions

  The sample includes object definitions with their roles, behaviors, peers, and communication contracts.
  Use these to understand what each object does and how the automation flows — but do NOT reproduce that flow in events.

  When generating modifications, set `target` to the `object_id` of the object whose behavior is being modified.

  ---

  ## Scenario Structure

  ### Modifications
  ```yaml
  modifications:
    - id: "M001"
      call_type: "send"
      source: "__user__"
      target: "ticket-router"
      when: "W02-1T10:30"
      intent: "The natural language instruction as a user would say it"
    - id: "M002"
      call_type: "send"
      source: "__user__"
      target: "notification-manager"
      when: "W02-2T14:00"
      intent: "Another rule change that refines or extends M001 — consistent with it, not contradicting it"
  ```

  **Modification coherence rule:** Modifications must form a coherent sequence. Each modification must be consistent with all prior modifications in the scenario. They represent the user progressively tuning the same automation — not independent or contradictory changes. For example: first restrict scope, then add an exception to the restriction, then adjust the notification format. Never have M002 undo or contradict M001.

  ### Events

  Events are **external triggers only** — inputs that arrive from outside the system and start the automation. They mirror the `steps` in the sample: the same kinds of things that enter the system from the outside world.

  Events are NOT:
  - System outputs (e.g., "downstream system receives notification")
  - Internal actions (e.g., "system looks up data", "object routes message")
  - Consequences of other events (e.g., "record updated after processing")

  The `recipient` is the object that receives the external trigger directly — the same entry-point object targeted in the sample's `steps`. It must be an object whose `event_sources` list is non-empty in the sample's object definitions. It is never a business logic object that only acts after receiving a chained message.

  `call_type`: always `"send_event"` for external system triggers, `"send"` for direct user messages.
  `source`: `"__external__"` for system-originated events, `"__user__"` for user messages.

  Each test case must include events distributed across **all N+1 timeline windows** formed by N modifications:
  - **Baseline events** (`role: pre_mod`, `after_mod_ids: []`): Fire before any modification. Test the system's default behavior before any change is applied.
  - **Inter-mod events** (`role: post_mod`, `after_mod_ids: ["M001"]` etc.): Fire after one modification but before the next. Test the cumulative state at each intermediate point. Include at least one event per gap between consecutive modifications.
  - **Post-all events** (`role: post_mod`, `after_mod_ids: ["M001", "M002", ...]`): Fire after all modifications. Test the fully-updated system.
  - **Unrelated events** (`role: irrelevant`, `after_mod_ids: []` or any subset): Fire at any point; test logic that should be unaffected by any of the modifications.

  `after_mod_ids` must list the IDs of ALL modifications that have fired before this event, in the order they were applied. An event with `when` between M001 and M002 has `after_mod_ids: ["M001"]`. An event after all mods has `after_mod_ids: ["M001", "M002", ...]`.

  **CRITICAL — post_mod events MUST exercise each modification's qualifying condition.**

  A modification is only useful if there is at least one post_mod event whose input
  actually triggers the scenario the modification covers. Before writing post_mod
  events, ask: "What kind of incoming event would cause this modification's effect
  to fire?" Then make sure at least one post_mod event matches that exact condition.

  Examples:
    Mod: "Send the weekly report on Tuesday 09:00 UTC instead of Monday for Week 2."
      ✓ Generate a post_mod event for the weekly-report scheduler trigger on
        Tuesday 09:00 UTC Week 2 (this event tests the rescheduled timing).
      ✗ Only generating ad-hoc support-request events does NOT test this mod —
        the weekly-report trigger never fires; the mod is untestable.

    Mod: "Route Windows 11 23H2 VPN lockout cases to Infrastructure."
      ✓ At least one post_mod event whose input matches "Windows 11 23H2 VPN
        lockout" so the modified routing fires.
      ✗ Post_mod events about printer issues do not exercise the VPN-specific
        routing.

    Mod: "When the address contains 'TX' or 'Texas', also append to the Texas tab."
      ✓ At least one post_mod event with an address containing 'TX' or 'Texas'.
      ✗ Post_mod events with only New York / California addresses don't exercise
        the conditional expansion.

  In addition to the matching-condition post_mod event(s), include event(s) that
  DON'T match the mod's condition — to verify the mod correctly leaves them alone.

  If a modification's qualifying condition genuinely cannot be exercised by any
  external event (e.g., the mod targets internal UI styling that has no eval
  surface), prefer a different modification that IS testable.

  Focus on writing high-quality `input` values — realistic external triggers that carry enough
  information for the full automation chain to run to completion. Expectations are written in a
  separate pass and are not part of your output.

  **Rule 1 — Carry all data the downstream chain needs.**
  An event input must include not just the trigger action but every piece of content that downstream
  objects will need to do their work. If any object in the chain writes, stores, or forwards outcome
  data (e.g., logs a resolution, writes a knowledge base entry, generates a report, sends a
  notification with specific details), that content must be present in the triggering input — it
  cannot be invented by the system mid-chain. Ask: "What would every downstream object need from
  this event to complete its job?"

  Examples of what to include:
  - A completion/close action → include the outcome, decision rationale, or resolution details
  - An approval action → include what was approved, by whom, and any conditions met
  - A handoff action → include the context the receiving party needs to act
  - A status change → include what changed, why, and any relevant identifiers

  **Rule 2 — Include conversation and session identifiers.**
  When the automation involves a messaging platform (chat, email, ticketing), the event input must
  include the thread, conversation, or session identifier (e.g., thread timestamp, ticket ID, session
  token). Objects that need to post replies or link follow-up messages back to the original context
  cannot do so without this identifier — the reply chain will silently stall.

  **Rule 3 — Satisfy all conditions required by the expected outcome.**
  Before writing an event, trace through the automation logic: if reaching the expected outcome
  requires multiple conditions to be true (e.g., all required approvers have approved, a threshold
  has been met, a record exists with a specific status), the event input must provide or imply all
  of those conditions. A partial trigger that satisfies only some conditions will cause the system
  to correctly wait or block — making the test case unresolvable.

  Each event must include a `role` field and an `after_mod_ids` list:
  - `pre_mod` + `after_mod_ids: []`: fires **before** any modification; tests baseline behavior
  - `post_mod` + `after_mod_ids: ["M001"]`: fires after M001 but before M002; tests intermediate state
  - `post_mod` + `after_mod_ids: ["M001", "M002"]`: fires after all modifications; tests fully-updated behavior
  - `irrelevant` + `after_mod_ids: []` (or any subset): fires at any time; tests logic **unrelated** to any modification

  ```yaml
  events:
    - id: "E001"
      call_type: "send_event"
      source: "__external__"
      recipient: "<entry-point object from sample>"
      when: "W02-1T09:00"
      role: "pre_mod"
      after_mod_ids: []
      input: "<external trigger content matching the sample's step pattern>"
    - id: "E002"
      call_type: "send_event"
      source: "__external__"
      recipient: "<entry-point object from sample>"
      when: "W02-2T12:00"
      role: "post_mod"
      after_mod_ids: ["M001"]
      input: "<trigger to test behavior after M001 but before M002>"
    - id: "E003"
      call_type: "send_event"
      source: "__external__"
      recipient: "<entry-point object from sample>"
      when: "W02-3T10:00"
      role: "post_mod"
      after_mod_ids: ["M001", "M002"]
      input: "<trigger to test fully-updated behavior after all modifications>"
      triggered_by: "E002"   # optional: E002 causes E003 to fire
    - id: "E004"
      call_type: "send_event"
      source: "__external__"
      recipient: "<entry-point object from sample>"
      when: "W02-2T08:00"
      role: "irrelevant"
      after_mod_ids: []
      input: "<trigger that exercises logic unaffected by any modification>"
  ```

  **`triggered_by` constraint:** If an event is triggered as a downstream consequence of another
  event firing (e.g., a reply arrives after the first event starts processing), set `triggered_by`
  to the **event ID** of the parent event (e.g., `"E001"`).
  NEVER set `triggered_by` to a modification ID (e.g., `"M001"`) — modifications are rule changes,
  not events, and cannot trigger events. If an event is not causally linked to another event,
  omit `triggered_by` entirely.

  ---

  ## Modification Type: {MODIFICATION_TYPE}

  {MODIFICATION_TYPE_DESCRIPTION}

  ---

  ## Timestamp Format

  `W{{week}}-{{day}}T{{HH:MM}}` (e.g., `W02-1T10:30` = Week 2, Monday, 10:30am)

  ---

  ## Generation Parameters

  Generate {SCENARIO_COUNT} scenario(s) with {MODS_PER_SCENARIO} modification(s) each.

  Modification type style: **{MODIFICATION_TYPE}**
  Write each modification `intent` as this kind of rule change.

  Ambiguity style for modification intents: **{AMBIGUITY_CONSTRAINT}**
  {AMBIGUITY_DESCRIPTION}
  Write all modification `intent` texts in this style.

  Each scenario must include:
  - {EVENTS_BEFORE_COUNT} baseline event(s) before the first modification (`role: pre_mod`, `after_mod_ids: []`)
  - {EVENTS_INTER_MOD_COUNT} inter-mod event(s) per gap between consecutive modifications (`role: post_mod`, `after_mod_ids` lists the mods fired so far)
  - {EVENTS_AFTER_COUNT} event(s) after the last modification (`role: post_mod`, `after_mod_ids` lists all mod IDs)
  - {EVENTS_UNRELATED_COUNT} irrelevant event(s), one per modification window: place each in the gap immediately after a mod fires (before the next mod, or in the final window after all mods). Each irrelevant event must have `role: irrelevant` and `after_mod_ids` set to the mods that have fired by that point — it shares the same window as the inter-mod event for that gap.

