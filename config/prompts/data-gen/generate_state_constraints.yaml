user_prompt: |
  You are setting up a CROSS-REQUEST INVARIANT scenario for an automation workflow. You supply only
  the REALISM — the invariant's type and limit, a structured initial state (the seed), and how a
  request READS. CODE then builds the exact request sequence (counts, timestamps, the simultaneous
  pair, the reset) and computes every outcome. So you do NOT write events, timestamps, or expectations.

  A cross-request invariant is a rule whose correct decision depends on STATE ACCUMULATED ACROSS MANY
  PRIOR REQUESTS — a cumulative cap, a per-key quota/counter over a period, a rolling rate-limit, a
  shared budget/pool, or a round-robin queue.

  THE TEST: would the correct handling of a request change if you removed/reordered the EARLIER
  requests? YES → cross-request invariant, use it. NO → it depends only on the current request →
  WEAK, reject it. If the template's only stateful rule is WEAK, INTRODUCE a realistic cross-request
  constraint a real operator would impose (a quarterly discount-budget cap for quote approval; a
  per-SKU reorder rate-limit for inventory; a per-rep daily cap for lead routing).

  Template:
  {WORKFLOW}

  Return JSON with:

  1. `constraint_type` — pick the one that GENUINELY FITS this workflow (do not default to a limit).
     When MORE THAN ONE fits, prefer in this order: trigger > cap/counter/rate_limit > dedup — an
     invariant whose accumulated state FIRES a visible action makes a stronger scenario than one
     that merely suppresses. In particular, when the workflow tracks PENDING items that get
     re-noticed over time (renewals approaching, expiries, overdue tasks), model the ACCUMULATION
    : several related pending items for the same key within the window → a combined action (a
     bundle offer, a consolidated escalation, one digest) — that is "trigger", NOT "dedup".
     - "cap": a cumulative total must stay at/below a ceiling (e.g. quarterly approved discount).
     - "counter": a per-key count within a period is capped, usually round-robin (e.g. leads/rep/day).
     - "rate_limit": at most N for the same key in a rolling window (e.g. reorders/SKU within 7 days).
     - "trigger": the INVERSE — the Nth related occurrence for a key within a rolling window FIRES
       the gated action (an escalation, a ticket, a digest, an OFFER); earlier occurrences only
       accumulate, and the count resets after firing. e.g. 3 complaints about the same product in
       7 days → escalation; or N subscriptions for the same account nearing renewal after first
       notification → a bundle-discount offer. Fits escalation/aggregation/alerting workflows.
     - "dedup": repeats are SUPPRESSED — the first occurrence for a key is processed; an identical
       one within a SHORT rolling window (minutes/hours) is recognized as a duplicate; past the
       window it is processed as new. Use dedup ONLY when suppression is the realistic behavior —
       and the duplicate must still be handled VISIBLY (merged into the open record, acknowledged),
       NEVER a silent "do nothing". When repeats should CAUSE something (an escalation, a warning,
       an offer), use "trigger" instead — a fired action is a stronger scenario than a suppressed one.

  2. `threshold` — the numeric rule, e.g. "$50,000 cumulative per quarter", "2 leads per rep per day",
     "2 reorders per SKU within any rolling 7 days"; trigger: "3 complaints about the same product
     within any rolling 7 days fire an escalation"; dedup: "duplicate reports for the same incident
     are ignored within a rolling 10 minutes". A rule over ACCUMULATED state, never a single request.

  3. `description` — one line stating the invariant in observable terms.

  4. `seed` — the INITIAL REFERENCE STATE the system reads, as a single JSON OBJECT serialized to a
     string (it becomes the read-service mock data verbatim). Standing facts only, CONCRETE realistic
     names/values (NO placeholders, NO "#1"). Keep it MINIMAL — the FEWEST entities that demonstrate
     the invariant (2-3 reps, 2-3 SKUs, exactly 2 approvers) — a large roster floods the system with
     traffic. Shape it to the type:
       - counter   → {"reps":[{"name":"Maya Patel","position":1,"daily_lead_cap":2},
                      {"name":"Jordan Lee","position":2,"daily_lead_cap":2}]}   (2-3 reps, NOT more)
       - rate_limit→ {"catalog":{"skus":[{"sku":"A100-XL","reorder_level":10,"on_hand":6},
                      {"sku":"B205-M","reorder_level":8,"on_hand":5},
                      {"sku":"C310-L","reorder_level":10,"on_hand":40}]}}   (the rate-limited SKUs MUST be
                      AT/BELOW reorder_level (on_hand <= reorder_level) so reorders are valid; include ALSO
                      exactly ONE WELL-STOCKED SKU (on_hand WELL ABOVE reorder_level) — the irrelevant event
                      names it (no reorder needed). Do NOT put ANY reorder history in the seed — no
                      "reorders_last_7d"/"last_reorder_date", no counts or dates; the window is computed
                      from the event timestamps. Standing catalog facts ONLY.)
       - trigger   → like rate_limit: 2-3 tracked keys (products/accounts/topics) as standing facts,
                      NO occurrence history (counts come from the event timeline), plus ONE entity
                      clearly outside the escalation pressure for the irrelevant event.
       - dedup     → 2-3 dedup keys (incident topics/monitored systems/locations) as standing facts,
                      NO report history, plus one entity outside the dedup rule for the irrelevant
                      event. The window config itself (e.g. {"dedup_window_minutes":10}) is fine.
       - cap       → {"sales_reps":[{"name":"James Brown","title":"Account Executive","manager":"Daniel Kim"},
                      {"name":"Laura Chen","title":"Account Executive","manager":"Olivia Chen"}],
                      "approvers":[{"name":"Daniel Kim","title":"Regional Sales Director","email":"daniel.kim@acme.example","manages":["James Brown"]},
                      {"name":"Olivia Chen","title":"Revenue Ops Manager","email":"olivia.chen@acme.example","manages":["Laura Chen"]}],
                      "discount_cap":50000}
                      (cap MUST show the full approval chain: each rep's TITLE + manager, and each
                      approver's TITLE, EMAIL, and who they manage — the approval request is emailed to
                      the manager, so every approver MUST have an email address.)
     NAMED HANDOFFS: when the workflow routes/hands off requests to a queue, team, or channel,
     the seed must name WHO serves it (e.g. {"queue_specialists": {"#netops-support":
     {"name": "Priya Nair", "slack_id": "U901PRIYA"}}}) — a queue with nobody behind it is an
     unfinished workflow; the association of that person with the request is part of the procedure.
     Include every entity the scenario reads. The seed is STANDING REFERENCE STATE only: NO outcomes,
     NO assignments, and NO accumulated/running/STARTING counts or totals (no "quarter_to_date...",
     no current counts, no history dates). The configured LIMIT/cap itself is fine (it's config); the
     scenario computes all accumulation from the event timeline.

  5. `phrasings` — templates with placeholders CODE fills: {ID} (lead/quote/request id), {AMOUNT}
     (cap), {KEY} (rate_limit SKU), {ENTITY} (the rep assigned / the approver), {DECO} (a fragment
     from `decorations`). Provide the REQUEST phrasing AND the OUTCOME phrasings (so the action
     wording is correct for THIS workflow — code only computes which outcome, you give the words):
       - counter    → role="request":  "A new lead {ID} {DECO} is submitted via the web form."
                      role="allowed":  "{ID} IS assigned to {ENTITY}, and the assignment is posted."
                      role="blocked":  "{ID} is NOT assigned (every rep is at the daily cap) and is held unassigned."
       - rate_limit → role="request":  "An inventory request {ID} for SKU {KEY} arrives by email {DECO}."
                      role="allowed":  "{KEY} is at/below its reorder level, so a supplier reorder IS sent ({ID})."
                      role="blocked":  "NO new reorder is sent for {KEY} ({ID}); only the routine reply goes out."
       - trigger    → role="request":  "A customer complaint {ID} about {KEY} arrives via the support form {DECO}."
                      role="recorded": "{ID} is logged against {KEY}; NO escalation is opened."
                      role="fired":    "An escalation ticket IS opened for {KEY} ({ID}) and the owning team is paged."
       - dedup      → role="request":  "An incident report {ID} about {KEY} is submitted {DECO}."
                      role="allowed":  "{ID} IS processed and an incident entry is created for {KEY}."
                      role="ignored":  "{ID} is recognized as a DUPLICATE and MERGED into the open {KEY} incident
                                        (a note is appended); NO new incident is created."
                      (the duplicate outcome must be a VISIBLE action — merge/append/acknowledge —
                       never a bare "ignored, nothing happens")
       - cap        → role="submit":   "Sales rep {SUBMITTER} submits quote {ID} in HubSpot requesting a ${AMOUNT} discount {DECO}."
                      role="approve":  "{APPROVER} responds in Slack to the approval request for quote {ID}."
                      role="submitted":"Quote {ID} is recorded in HubSpot; the system EMAILS the approval request to
                                        {SUBMITTER}'s manager, {MANAGER}, who can act on it in Slack."
                      role="approved": "{ENTITY} approves {ID} (${AMOUNT}) back via Slack; HubSpot records it as approved."
                      role="held":     "{ENTITY} approves {ID} (${AMOUNT}) in Slack, BUT the system holds it for exception
                                        handling — the approval cannot take effect because it would breach the cap."
       (CHANNELS: the approval REQUEST goes OUT by EMAIL to the manager; the manager's DECISION comes
        BACK via SLACK. The submit EVENT is only the stimulus — it MUST NOT name the approver (routing
        is the quote-approval-policy object's job; the "submitted" EXPECT VERIFIES the email went to the
        right manager). {SUBMITTER}=rep, {MANAGER}=that rep's manager, {ENTITY}=the manager who decides
        — all filled by code from the seed's sales_reps.)
     role="followup" (OPTIONAL): when a step says the notified party acts BACK (the assigned
     owner updates status from Slack), provide the phrasing for that inbound interaction — and
     prefer the FULL lifecycle (and the follow-up is a RAW stimulus: what the person says/does —
     its downstream effects like "the solution is appended to the KB" belong in the EXPECT, never
     in the event text): the follow-up RESOLVES the item ("{CONTACT} replies in {KEY}'s
     support channel marking the ticket RESOLVED with the fix notes"), and the outcome states the
     downstream effects the steps promise (the resolution is appended to the knowledge base via
     its write tool). An item that is opened but never resolved leaves the KB-update step
     untested.
     NOTIFICATION EMAILS ARE GROUNDED: when steps say a person is emailed (the submitter, their
     manager), the outcome names the ADDRESS via {SUBMITTER_EMAIL}/{MANAGER_EMAIL} (code fills
     them from the seed) — so every notified person must carry an email in the seed.
     (No special "irrelevant" phrasing is needed: code derives the scope-proof event from the
     normal request phrasing — a request the workflow handles normally whose outcome is IDENTICAL
     before and after the modification. `irrelevant_key` below names the entity it uses.)
     The OUTCOME phrasings MUST describe the workflow's REAL gated action (a reorder, an assignment,
     an approval) — make "blocked"/"held" clearly state the action did NOT happen. Put NO number,
     count, or date in any phrasing — only placeholders + flavor.
     THE GATED ACTION IS DISTINCT: the invariant's gated action must be CLEARLY different from the
     workflow's per-event behavior — a different action, channel, or recipient — OR explicitly
     REPLACE it, stated in the threshold/description ("INSTEAD of the per-expense email, a single
     consolidated alert..."). If the gated action is the same email to the same recipient that
     every event already produces, the scenario cannot be judged — pick a distinct action.
     DEFINED ARTIFACTS ONLY: every artifact an outcome mentions (a pending list, a digest, a
     tracker, an open ticket) must be DEFINED in the seed or named in a workflow step — never
     invent an entity inside an outcome. State the accumulated items' full LIFECYCLE explicitly:
     where they are parked (the seed-defined artifact) and what releases them (the Nth occurrence
     fires / the window clears).
     trigger ONLY — optional role="consolidated": wording for occurrences arriving AFTER the fired
     action while its window is open. Provide it ONLY if the fired artifact is MUTABLE (a ticket,
     a doc, a list that can be amended); NEVER claim to amend a SENT email. If omitted, code words
     these as "logged against the already-issued {unit}".
     OUTCOMES NARRATE THE DECISION PATH: when the steps gate the action on a prior CHECK (a
     knowledge-base lookup, an eligibility check, a duplicate scan), the outcome states that
     check's result as part of the flow ("the knowledge-base lookup returns no instant fix, so a
     ClickUp ticket IS created") — an outcome that skips a stated step violates the procedure.
     OUTCOMES ARE EXPLICIT AND OBSERVABLE: every outcome names the concrete CHANNEL and RECIPIENT
     ("a consolidated escalation email IS sent to the finance team's inbox", not "finance is
     notified" / "the team is escalated"). An accumulate/recorded/not-yet outcome must say BOTH
     what observably happens AND what does NOT ("the notice is appended to the pending list in the
     tracking sheet; NO email is sent yet" — never just "added to pending notices", which leaves
     the reader guessing whether an email went out). Use the SAME action wording in the
     description, the threshold, and the outcomes — if the rule says "a consolidated escalation
     email to finance", the fired outcome says exactly that, not a paraphrase.
     CONCRETE VALUES ONLY: every detail a phrasing mentions must carry an ACTUAL value — inline in
     the template or via {DECO} ("$240 for an airport transfer", "submitted 2026-03-14"). NEVER
     meta-fillers that name a field without its value: "date entered", "description entered",
     "amount $", "details provided" are all FORBIDDEN. If you don't want to invent a value for a
     detail, OMIT that detail entirely.
     REQUEST = RAW STIMULUS: the request template must read exactly as the SOURCE system would emit
     it (a webhook payload arriving, an emoji reaction being added, an email landing, a form being
     submitted). NEVER phrase it as the system's own processing — "is detected", "is captured",
     "is processed", "is triaged" are FORBIDDEN in the request (detection is the system's job; the
     OUTCOME phrasings describe what the system then does). The request must also CARRY INLINE all
     per-event content the workflow later reads (the message text, the amount, the category, the
     ask) — per-event content cannot live in the seed.
     ANALYSIS IS A MOCK-API CAPABILITY: when a workflow step ANALYZES/classifies content
     (sentiment, priority, topic, intent), that analysis is an EXTERNAL service the system calls —
     agents wrap domain functionality; they never perform the analysis themselves. The request
     carries the RAW content (no pre-computed labels — an event arriving pre-labeled skips the
     analysis step entirely), written so the expected classification is obvious to a reader; the
     ANALYSIS SERVICE (a mock tool) returns the result by applying RULES-BASED criteria to the
     TEXT it is given (a term in the text implies the value) — never an event-id lookup. Declare:
     `analysis_field` (e.g. "sentiment"), `analysis_label` (the value counting events reflect,
     e.g. "negative"), and `analysis_terms` — 3-6 short, distinctive terms that imply the label
     ("lawsuit", "outage", "refund refused"). EVERY counting event's content must contain at
     least one term (put them in the decorations/request content); `irrelevant_deco` provides one
     clearly NON-matching content (a positive mention, no terms) for the event the analysis
     filters out — so not everything in the scenario is the same sentiment. The tracked `keys`
     are ENTITY names (brands, products, accounts) and must NOT embed any analysis term
     ("AcmeCloud", never "AcmeCloud outage" — the term belongs in the event text, the key is what
     the term is ABOUT). Code publishes the
     rules as seed.analysis_rules; the analysis service's behavior must SAY it applies those
     seeded rules to the text. Leave all empty when no step analyzes.
     EVERY VALUE HAS RULES — `analysis_values`: the rules must define EVERY classification value
     the workflow acts on, not only the counting one ({"positive": ["praise","wins","commended"]}
     when positive mentions post to a wins channel). A value the workflow routes on with no rule
     behind it is unclassifiable.
     KEYS DERIVED FROM CONTENT — `key_contents`: when the classification DETERMINES the key
     (topic routing), provide per-key content fragments ({"account-lockout": ["locked out of my
     account after three attempts", ...]}) — the event text carries ONLY such content (never the
     key/topic name; remove {KEY} from the request template) and the system must categorize it.
     ANALYSIS CRITERIA IN SEED: the seed must also DEFINE what the analysis is applied against —
     the monitored topics, priority rules, category definitions — like any signal→action mapping.
     analysis_field must be the EXACT classification the steps perform (topic, priority,
     sentiment) — NEVER import a foreign concept (no "sentiment" in a helpdesk that classifies
     topics; no "priority" in a brand monitor that classifies sentiment).
     BRANCH COVERAGE — `branch_demos`: every DISTINCT handling path the steps describe gets ONE
     demonstrating event: {"content": the per-event text matching that path ("the new dashboard
     wins praise from reviewers" / "printer setup question — known fix KB-077"), "action": the
     explicit expected outcome with the channel/recipient/tool named ("the mention is classified
     positive and posted to #brand-wins; it does NOT enter the negative count" / "the KB lookup
     returns the KB-077 instant fix, which is sent as a DM; NO ticket is created")}. A stated
     path with no event is an untested promise.
     The submitting ACTOR is identified: any request a person initiates (a leave request, an
     expense, a support request) must name that person via {SUBMITTER} (filled by code from the
     seed's people) — an anonymous "an employee" cannot be routed, attributed, or capped. When
     requests are person-initiated, the seed MUST therefore include 2-3 NAMED requesters (with
     the attributes routing needs).
     The SUBMISSION VENUE is shown: when the steps specify HOW requests arrive (a Slack command,
     a form, a specific channel), the request phrasing must show that mechanism ("/support in
     #it-help", "via the leave form") — an event that skips the stated entry path contradicts
     the workflow.
     IMPORTANT — the examples above show the FORMAT per family; phrase EVERY template for THIS
     workflow's actual domain, entities, action, and channels. A different rate_limit might be
     "API calls per user per hour" (not reorders/SKUs); a different counter might be on-call shifts
     (not leads/reps); a different cap might route via a ticketing tool (not email/Slack). Use the
     real nouns and channels of the workflow in front of you — do NOT copy the example domains.

  6. `unit` — the gated action's noun for THIS workflow: "reorder", "lead assignment", "approval"
     (used in the computed reasons).

  7. `decorations` — 8–12 short realistic NL fragments (filled into {DECO}). counter/rate_limit:
     customer/company flavor ("from Northwind Logistics requesting a demo"). cap: the customer/account
     the quote is for, e.g. "for Acme Corp's annual renewal", "for the Globex expansion deal" (the
     submitting rep + manager come from the seed, NOT decorations).
     Decorations MUST be ENTITY-NEUTRAL: never name a seed entity (a rep, SKU, subscription, contact,
     channel) — code pairs {KEY}/{ENTITY} with decorations INDEPENDENTLY, so an entity-bearing
     decoration creates contradictions (e.g. a reminder for contact A decorated with contact B's
     subscription). The same applies to IMPLYING a key: when keys are topics/categories, a
     decoration must not contain another topic's tell-tale content ("sso loop" decorating a
     vpn-access request mislabels it). Invent outside flavor (customers, products, reasons) that
     fits ANY key equally.

  8. `entities` — counter ONLY: the rotation members IN ORDER, as a flat list of names EXACTLY as
     they appear in the seed (any domain — reps, channels, agents, queues): e.g.
     ["Maya Patel","Jordan Lee"] or ["#eng-platform","#eng-apps","#eng-data"]. Code drives the
     round-robin from THIS list. Leave empty for cap/rate_limit.

  9. `keys` — rate_limit/trigger/dedup: the tracked KEY VALUES from the seed, as a flat list (any
     domain — SKU codes, expense categories, contact emails, products, incident topics): e.g.
     ["A100-XL","B205-M"] or ["Travel","Meals"]. At least 2 (the scenario proves the rule is PER
     KEY); the FIRST is the main key it exercises. Leave empty for cap/counter.

  10. `key` — rate_limit/trigger/dedup: the main key (same as keys[0]). Leave empty for cap/counter.

  11. `irrelevant_key` — DEPRECATED, leave empty (code derives the modification-scope-proof event
      from the tracked keys directly: a request the workflow handles normally that the modification
      does not target).

  13. `cap_scope` — cap ONLY: "shared" (one pool for everyone — a team budget) or "per_person"
      (each person has their OWN running budget — leave days, expense allowances). Pick what the
      workflow's rule actually means; the simulation and the reasons follow it.
      With per_person, when each person's limit DIFFERS (their own seeded balance), provide
      `person_caps` — {"Ava Martinez": 18, "Ethan Brooks": 12} — matching the seed EXACTLY; the
      reasons then cite "their configured balance of 18 vacation days". Also provide `qty_noun`
      for non-monetary caps ("vacation days") — reasons must never say "units".

  14. `key_contacts` — REQUIRED whenever the gated action notifies someone/somewhere about a key:
      a map from each tracked key to the CONCRETE recipient — an email address OR a Slack channel
      OR a named owner, from the seed: {"Northwind": "renewals@northwind.example"} or
      {"vpn-access": "#netops-support (Priya Nair)"}. Outcome phrasings then use {CONTACT} so
      every expect names WHERE the notification went. The recipients must exist in the seed.

  12. SIGNAL → ACTION MAPPING: whenever the workflow INTERPRETS a signal to decide what to do —
      an emoji reaction, a label, a keyword, a form category — the seed MUST define that mapping
      explicitly (e.g. {"reaction_mappings":[{"emoji":":ticket:","action":"create_jira_issue"}]}),
      because the system can only act deterministically on mappings it can READ. Every request
      phrasing must use a signal DEFINED in the mapping; the irrelevant event uses an UNMAPPED
      signal (proving the mapping is consulted, not assumed).

  Return only the JSON object (constraint_type, threshold, description, seed, phrasings, unit,
  decorations, entities, keys, key, irrelevant_key). Do NOT write events, timestamps, or
  expectations — code builds those.
