user_prompt: |
  You are setting up a CROSS-REQUEST INVARIANT scenario for an automation workflow. You supply only
  the REALISM — the invariant's type and limit, a structured initial state (the seed), and how a
  request READS. CODE then builds the exact request sequence (counts, timestamps, the simultaneous
  pair, the reset) and computes every outcome. So you do NOT write events, timestamps, or expectations.

  A cross-request invariant is a rule whose correct decision depends on STATE ACCUMULATED ACROSS MANY
  PRIOR REQUESTS — a cumulative cap, a per-key quota/counter over a period, a rolling rate-limit, a
  shared budget/pool, or a round-robin queue.

  THE TEST: would the correct handling of a request change if you removed/reordered the EARLIER
  requests? YES → cross-request invariant, use it. NO → it depends only on the current request →
  WEAK, reject it. If the template's only stateful rule is WEAK, INTRODUCE a realistic cross-request
  constraint a real operator would impose (a quarterly discount-budget cap for quote approval; a
  per-SKU reorder rate-limit for inventory; a per-rep daily cap for lead routing).

  Template:
  {WORKFLOW}

  Return JSON with:

  1. `constraint_type` — one of:
     - "cap": a cumulative total must stay at/below a ceiling (e.g. quarterly approved discount).
     - "counter": a per-key count within a period is capped, usually round-robin (e.g. leads/rep/day).
     - "rate_limit": at most N for the same key in a rolling window (e.g. reorders/SKU within 7 days).

  2. `threshold` — the numeric limit, e.g. "$50,000 cumulative per quarter", "2 leads per rep per day",
     "2 reorders per SKU within any rolling 7 days". A limit on ACCUMULATED state, never a single request.

  3. `description` — one line stating the invariant in observable terms.

  4. `seed` — the INITIAL REFERENCE STATE the system reads, as a single JSON OBJECT serialized to a
     string (it becomes the read-service mock data verbatim). Standing facts only, CONCRETE realistic
     names/values (NO placeholders, NO "#1"). Keep it MINIMAL — the FEWEST entities that demonstrate
     the invariant (2-3 reps, 2-3 SKUs, exactly 2 approvers) — a large roster floods the system with
     traffic. Shape it to the type:
       - counter   → {"reps":[{"name":"Maya Patel","position":1,"daily_lead_cap":2},
                      {"name":"Jordan Lee","position":2,"daily_lead_cap":2}]}   (2-3 reps, NOT more)
       - rate_limit→ {"catalog":{"skus":[{"sku":"A100-XL","reorder_level":10,"on_hand":6,"reorders_last_7d":0},
                      {"sku":"B205-M","reorder_level":8,"on_hand":25,"reorders_last_7d":0}]}}   (2-3 SKUs — the
                      limit is PER SKU, so a second SKU is REQUIRED to show it generalizes)
       - cap       → {"approvers":["Daniel Kim","Olivia Chen"],
                      "quarter_to_date_approved_discount":0,"discount_cap":50000}
     Include every entity the scenario reads. NO outcomes, NO assignments, NO post-event counts.

  5. `phrasings` — how each kind of request READS, as templates with placeholders CODE fills: {ID}
     (lead/quote/request id), {AMOUNT} (cap only), {KEY} (rate_limit SKU), {APPROVER} (cap approval),
     {DECO} (a realism fragment from `decorations`). Provide exactly:
       - counter    → ONE, role="request":  "A new lead {ID} {DECO} is submitted via the web form."
       - rate_limit → ONE, role="request":  "An inventory request {ID} for SKU {KEY} arrives by email {DECO}."
       - cap        → TWO (the action is taken by a DISTINCT APPROVER the steps name — there is no
                      auto-approval). The submission MUST name the submitting SALES REP (via {DECO})
                      so the rep→approver chain is clear:
           role="submit":  "Sales rep {DECO} submits quote {ID} in HubSpot requesting a ${AMOUNT} discount."
           role="approve": "{APPROVER} approves quote {ID} in Slack."
     Put NO number, count, date, status, or outcome in a phrasing — only the placeholders + flavor.

  6. `decorations` — 8–12 short realistic NL fragments to vary requests (filled into {DECO}). For
     counter/rate_limit these are customer/company flavor ("from Northwind Logistics requesting a demo").
     For cap, {DECO} is the SUBMITTING SALES REP — make each a rep name + account, e.g.
     "James Brown (for Acme Corp)", "Laura Chen (for Globex)".

  7. `key` — rate_limit ONLY: the exact SKU code (from the seed catalog) the scenario exercises.
     Leave empty for cap/counter.

  Return only the JSON object (constraint_type, threshold, description, seed, phrasings, decorations,
  key). Do NOT write events, timestamps, or expectations — code builds those.
