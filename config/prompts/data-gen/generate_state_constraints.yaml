user_prompt: |
  You are infusing a STRONG CROSS-REQUEST INVARIANT into an automation workflow and
  authoring the base scenario that exercises it. A cross-request invariant is a rule whose
  correct decision depends on STATE ACCUMULATED ACROSS MANY PRIOR REQUESTS — a cumulative
  cap, a per-key quota/counter over a period, a rolling rate-limit, a running total, a
  shared budget/pool, or a round-robin queue.

  THE TEST (apply it strictly): would the correct handling of a request change if you
  removed or reordered the EARLIER requests?
    - YES → the decision depends on history → STRONG cross-request invariant. Use it.
    - NO  → it depends only on the current request's own fields → WEAK per-message decision.
            REJECT it; do NOT dress it up as a cap/rate-limit.

  WEAK — reject (these read ONLY the current request):
    - "reorder when THIS product's quantity is at/below its reorder level" (current product)
    - "send a reminder 24h after THIS quote" / "escalate after 24h" (per-entity timing)
    - "route THIS lead by its region / company size" (current lead)
    - "require approval when THIS quote's discount is over 20%" (current quote)
  STRONG — use (these accumulate across requests):
    - cumulative approved discount this quarter must stay at/below $50,000 (running total vs ceiling)
    - no more than 2 reorders for the SAME SKU within any rolling 7 days (rolling rate-limit)
    - no sales rep receives more than N leads per day (per-key counter over a period)
    - assign leads round-robin so reps take turns in order (shared rotation queue)
    - requests draw against a shared $X budget pool (shared pool)

  Pick the STRONGEST genuine invariant. If the template already implies one (e.g. a
  round-robin rotation), exercise it. If the template's only stateful rule is WEAK /
  per-message, you MUST INTRODUCE a realistic cross-request constraint that a real operator
  would impose on THIS workflow — e.g. a quarterly discount-BUDGET cap for a quote-approval
  flow, or a per-SKU reorder RATE-LIMIT for an inventory flow. Introducing a strong invariant
  is REQUIRED over force-fitting a weak one.

  This runs BEFORE grounding: keep all NUMBERS and the invariant LOGIC concrete and exact,
  but use PLACEHOLDER labels for entities you don't yet know — e.g. "Rep #1", "Rep #2",
  "Lead #1", "SKU #1". A later grounding step replaces these placeholders with concrete
  names consistently. Use as many distinct placeholders as the scenario genuinely needs
  (e.g. a 3-way round-robin needs Rep #1, Rep #2, Rep #3).

  Template:
  {WORKFLOW}

  Author a role="base" event sequence that EXERCISES the invariant and crosses its
  threshold, plus a short descriptor. Return JSON with:

  1. `constraint_type` — one of:
     - "cap": a cumulative total must stay at/below a ceiling;
     - "counter": a per-key count within a period is capped (e.g. per-rep-per-day);
     - "rate_limit": at most N occurrences for the same key in a rolling window.

  2. `threshold` — the numeric limit of the invariant you chose or introduced
     (e.g. "$50,000 cumulative per quarter", "2 leads per rep per day", "2 reorders per SKU / 7d").
     It must be a limit on ACCUMULATED state, never a property of a single request.

  3. `description` — one line stating the invariant in observable terms.

  4. `seed` — the INITIAL REFERENCE STATE the system READS, as a single JSON OBJECT serialized
     to a string. This is the AUTHORITATIVE reference data the read-services serve (it becomes the
     mock-API responses verbatim), object-agnostic, using the SAME placeholder labels as the
     events. It is what the workflow LOOKS UP — standing facts ONLY: NOT events, NOT outcomes,
     NOT post-event counts. Make it COMPLETE — include EVERY piece of reference state the scenario
     reads — and structure it with clear field names. Examples (return as a JSON string):
       - roster: {"reps":[{"name":"Rep #1","position":1,"daily_lead_cap":2},
                  {"name":"Rep #2","position":2,"daily_lead_cap":2},
                  {"name":"Rep #3","position":3,"daily_lead_cap":2}]}
       - catalog: {"skus":[{"sku":"SKU #1","reorder_level":10,"on_hand":6,"reorders_last_7d":0},
                  {"sku":"SKU #2","reorder_level":8,"on_hand":20,"reorders_last_7d":0}]}
       - approvers: {"approvers":["Approver #1","Approver #2"],
                  "quarter_to_date_approved_discount":0,"discount_cap":50000}
     The base events and their expects MUST be consistent with this seed (positions, caps,
     starting totals, reorder history). Do NOT put outcomes, decisions, or post-event counts in
     the seed — it is the state BEFORE the scenario runs. Return valid JSON.

  5. `base_events` — an ordered role="base" sequence, authored as ONE coherent unit from a
     clean initial state.

     THE ACTION CHAIN (the crux — get this right). Each request is a pure external stimulus;
     the system then READS its state (via its data objects), performs THE GATED ACTION this
     workflow exists to do — sends a reorder, assigns a lead, approves a quote — and the
     invariant GATES that action. Every `expect` must center THE GATED ACTION's outcome. A
     workflow often ALSO does something incidental every time (reply with the data, log,
     acknowledge); that incidental effect must NEVER stand in for the gated action. E.g. an
     inventory flow always replies with data AND conditionally sends a reorder — the expect
     must be about the REORDER, not the data reply.

     Compose the sequence:
       - 1–3 below-threshold requests handled NORMALLY — the gated ACTION IS TAKEN and the
         expect SAYS SO explicitly: "a reorder request is sent to the supplier", "the lead is
         assigned to Rep #1 and the assignment is posted", "the quote is approved AND the
         approval is posted to the channel". (Show the action AND its notification — not a bare
         "approved".) The accumulator moves with each.
       - the request that CROSSES the threshold — the gated action is BLOCKED / HELD /
         SUPPRESSED; the expect says the action did NOT happen, with a reason that REFERENCES
         THE ACCUMULATED STATE: "2 reorders were already sent for this SKU within the last
         7 days, so NO new reorder is sent (only the routine data reply goes out)".
       - REQUIRED — a CONCURRENT pair at the threshold (every workflow): TWO requests for the
         SAME key (same SKU / same rep / same pool) sharing the SAME non-empty `when` (e.g. both
         "W01-1T11:00") and the SAME `concurrent_group` label (e.g. "cg_limit"). POSITION IT
         CORRECTLY: that key must ALREADY have exactly (limit − 1) ACCEPTED same-key requests
         earlier in-window, so the two simultaneous arrivals compete for the ONE remaining slot —
         one takes it (accepted), the other is blocked. For limit = 2 that means EXACTLY ONE
         prior accepted same-key request before the pair. A pair on a FRESH key (no prior
         accepted requests) is WRONG: both are within the limit, so NEITHER should block.
       - REQUIRED for `counter` and `rate_limit` — a RESET / WINDOW-EXPIRY event: a request for
         the SAME key as a blocked one, timestamped PAST the period (the NEXT DAY for a per-day
         counter; 8+ days later for a rolling-7-day limit), which is ALLOWED AGAIN — the action
         IS taken — because the limit is PER-PERIOD, not absolute. Its expect must say the
         action resumes and why: "it is now a new day, so the per-day count resets — the lead
         IS assigned to Rep #1"; "more than 7 days have passed since the earlier reorders, so
         the window no longer bars it — a new reorder IS sent". (Skip this only for `cap`.)
     Use concrete, unambiguous NUMBERS and TIMESTAMPS so both the running count AND the period
     boundaries are computable from the inputs alone.

  EVENT INPUTS ARE EXTERNAL STIMULI ONLY — do NOT mix in state. Each `input` is the request
  exactly as it ARRIVES from outside, carrying ONLY its own payload (the lead's details, the
  quote's discount amount, the SKU being requested). It must NOT state the system's internal
  or accumulated state — NO current inventory quantity, NO roster of active reps, NO running
  count, NO "clean start for the day", NO "current data shows quantity 4". The system ACQUIRES
  that state itself by interacting with its data objects. The threshold-crossing is driven by
  the SEQUENCE of arriving requests, never by state asserted inside any single input.
    - GOOD: "Reorder request arrives for SKU NSO-A100-XL (reply-to: ops@acme.test)."
    - BAD:  "Reorder request for SKU NSO-A100-XL; current inventory shows quantity 4."  (feeds state)
    - GOOD: "New lead arrives: Olivia Chen, Northwind Bio, enterprise plan."
    - BAD:  "New lead arrives. Reps Maya, Jordan, Sofia are active and it's a clean start."  (mixes roster state)

  GATED-ACTION ACTOR — who performs the action matters. If the workflow's steps show the gated
  action is taken by a DISTINCT named role/actor — an approver, reviewer, or dispatcher who must
  act (e.g. "an approval request is sent to the Sales Director, who approves or rejects it in
  Slack") rather than the system deciding automatically — then the base events that move the
  accumulator MUST be THAT ACTOR's decisions, phrased as the actor acting:
    - GOOD: "Approver #1 (the Sales Director) approves quote Q-1001 ($12,000 discount) in Slack."
    - BAD:  "Rep submits quote Q-1001 in HubSpot." then expecting it to just be "approved"  (there
            is NO auto-approval — the approver must act; a bare submission never approves anything).
  The accumulation happens on the ACTOR's action, and the threshold blocks the ACTOR from taking
  it: "approving Q-N would push the quarter's approved discount over $50,000, so Approver #1 does
  NOT approve Q-N — it is held for exception handling; no approval is recorded." List the actor(s)
  in the seed. (When the gated action IS automatic — a system reorder/assignment — the event is the
  triggering request itself, as usual.)

  DECOUPLING — this is critical. Do NOT assume or mention HOW the rule is implemented.
  Do NOT reference any specific object as "the owner", and do NOT use internal mechanics
  (no "custodian", no "reserve/confirm/release", no "hold id", no per-object accumulator
  field). Phrase every `base_events[i].expect.action` purely in terms of the OBSERVABLE
  OUTCOME OF THE GATED ACTION — what the system does (or refuses to do) with the request —
  so the expectation holds for ANY correct implementation. Each example below NAMES the
  action and (when admitted) its notification:
    - ADMITTED: "Quote Q-1001's discount keeps the quarter total at/under $50,000, so it is
      approved AND the approval is posted to the channel."
    - BLOCKED:  "Quote Q-1004 would push the quarter's approved discount over $50,000, so it
      is NOT approved — it is escalated for a budget exception and left pending; no approval
      is recorded or posted."
    - BLOCKED:  "2 reorders were already sent for SKU #1 within the last 7 days, so NO new
      reorder is sent for this request — only the routine inventory-data reply goes out."
    - RESET:    "It is now a new day, so Rep #1's per-day count resets — lead #6 IS assigned
      to Rep #1 and the assignment is posted."
  Make the threshold-crossing AND the period reset unambiguous from the numbers/timestamps alone.

  Each base event has fields (OBJECT-AGNOSTIC — no recipient, no object_id):
    id (E001, E002, … ascending),
    call_type = "send_event",
    source = "__external__",
    input = the arriving request's OWN payload only (no internal/accumulated state),
    when = "W01-1T09:00" style, ascending (the concurrent pair shares one `when`),
    role = "base",
    concurrent_group = a label (e.g. "cg_limit") on the two simultaneous events; null otherwise,
    expect = { action, reason }   (observable outcome, no internal mechanism).

  Return only the JSON object (constraint_type, threshold, description, seed, base_events).
  Do not output any object definitions or modifications.
