user_prompt: |
  # Task: Generate Test Scenarios

  You are designing realistic test scenarios for an automation. Generate scenarios 
  that feel like actual business operations, not contrived examples.

  ---

  ## Sample

  {SAMPLE}

  ---

  ## Your Task

  Generate scenarios. Each scenario contains:
  - One or more modifications (natural language rule changes)
  - Events that validate the modifications

  **Critical**: Modifications and events must be grounded in the actual objects and their behaviors.
  Only reference entities, rules, and logic that exist in the instance.
  Events must be the same kind of external trigger as the sample's `steps` — not internal consequences.

  Do not invent concepts (like dollar thresholds) that are not part of the automation.

  ## Object Definitions

  The sample includes object definitions with their roles, behaviors, peers, and communication contracts.
  Use these to understand what each object does and how the automation flows — but do NOT reproduce that flow in events.

  When generating modifications, set `target` to the `object_id` of the object whose behavior is being modified.

  ---

  ## Scenario Structure

  ### Modifications
  ```yaml
  modifications:
    - id: "M001"
      call_type: "send"
      source: "__user__"
      target: "ticket-router"
      when: "W02-1T10:30"
      intent: "The natural language instruction as a user would say it"
    - id: "M002"
      call_type: "send"
      source: "__user__"
      target: "notification-manager"
      when: "W02-2T14:00"
      intent: "Another rule change that builds on or interacts with M001"
  ```

  ### Events

  Events are **external triggers only** — inputs that arrive from outside the system and start the automation. They mirror the `steps` in the sample: the same kinds of things that enter the system from the outside world.

  Events are NOT:
  - System outputs (e.g., "Approver receives Slack notification")
  - Internal actions (e.g., "System looks up manager", "Object routes ticket")
  - Consequences of other events (e.g., "HubSpot record updated after approval")

  The `recipient` is the object that receives the external trigger directly — the same entry-point object targeted in the sample's `steps`. It must be an object whose `event_sources` list is non-empty in the sample's object definitions. It is never a business logic object that only acts after receiving a chained message.

  `call_type`: always `"send_event"` for external system triggers, `"send"` for direct user messages.
  `source`: `"__external__"` for system-originated events, `"__user__"` for user messages.

  Each test case may include:
  - **Before events**: Trigger the SAME logic the modification will change. Shows "before" behavior.
    Example: If modification is "skip Sarah in approval rotation", send a quote that would route to Sarah → expect: routed to Sarah
  - **After events**: Same type of external trigger, but now the modification applies. Shows "after" behavior.
    Example: Same type of quote → expect: routed to someone else (Sarah skipped)
  - **Unrelated events**: A different external trigger that exercises logic unaffected by the modification
  - If multiple modifications: events between modifications to test intermediate states

  **Rules for writing assertable events:**

  1. **Ambiguity applies to the modification intent, never to `expect.action`.**
     Even when a modification is vague (e.g., "Sarah is out for a while"), `expect.action`
     must commit to a specific, observable outcome — which object acted, what it sent or
     recorded, to whom. Take the most natural interpretation of the vague intent and state
     it concretely. Never hedge with words like "appropriately", "as needed", or "if applicable".

  2. **`expect.action` describes terminal observable output, not internal routing.**
     Write what would appear in a write-service state, a reply, or an external system record:
     "Approval email sent to Michael Johnson (manager)", "HubSpot quote Q-1234 marked Approved",
     "Slack message posted to #deal-desk". Not "system routes to approver" or "object handles request".

  3. **For removal modifications, specify the fallback.**
     After-events must state both (a) what no longer happens, AND (b) what happens instead —
     or explicitly that the trigger completes without that action and the workflow continues
     normally through another channel. Example: "No approval email sent; approval request
     delivered via Slack channel instead."

  4. **Before-events must test the exact condition the modification will change.**
     If the modification will change how quotes above 10% discount are routed, the before-event
     must include a quote above 10% discount and expect the pre-modification routing. A generic
     passing scenario is not a regression test.

  5. **`expect.reason` must name the specific rule, behavior clause, or peer relationship**
     that produces the outcome (e.g., "org-directory rule: combined concessions require finance
     director approval"). Not a description of the modification's ambiguity.

  ```yaml
  events:
    - id: "E001"
      call_type: "send_event"
      source: "__external__"
      recipient: "hubspot"
      when: "W02-1T09:00"
      input: "New quote Q-1234 created by Alice: 10% discount requested"
      expect:
        action: "What the system should ultimately do (the observable outcome)"
        reason: "Which rule or object behavior drives that outcome"
  ```

  ---

  ## Modification Type: {MODIFICATION_TYPE}

  {MODIFICATION_TYPE_DESCRIPTION}

  ---

  ## Timestamp Format

  `W{{week}}-{{day}}T{{HH:MM}}` (e.g., `W02-1T10:30` = Week 2, Monday, 10:30am)

  ---

  ## Generation Parameters

  Generate {SCENARIO_COUNT} scenario(s) with {MODS_PER_SCENARIO} modification(s) each.

  Modification type style: **{MODIFICATION_TYPE}**
  Write each modification `intent` as this kind of rule change.

  Ambiguity style for modification intents: **{AMBIGUITY_CONSTRAINT}**
  {AMBIGUITY_DESCRIPTION}
  Write all modification `intent` texts in this style.

  Each scenario must include:
  - {EVENTS_BEFORE_COUNT} events before the first modification
  - {EVENTS_AFTER_COUNT} events after the last modification
  - {EVENTS_UNRELATED_COUNT} events unaffected by the modifications