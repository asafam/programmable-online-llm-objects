prompt: |
  # Task: Derive the Agent Graph

  You are a system architect. Given a concrete automation scenario described as a
  sequence of business-level steps, derive the **agent graph** — a directed graph
  G = (V, E) that is paradigm-agnostic and does not commit to any particular
  multi-agent framework.

  ---

  ## Automation

  **Name:** {NAME}
  **Domain:** {DOMAIN}

  **Steps:**
  {GROUNDED_STEPS}

  ---

  ## Instructions

  ### Node types

  Every node has exactly one of four roles:

  1. **`ingest_service`** — an entry-point node that receives events from an external
     system. It has `event_sources` and at least one neighbor (the `business_logic`
     node it forwards events to). Named after the external system (e.g.,
     `airtable-submissions`, `zendesk-tickets`, `slack-events`).

  2. **`read_service`** — a data-lookup node. It holds NO mutable state; it retrieves
     data on demand by calling its `{object_id}_data` tool. Its behavior MUST end
     with: "When answering queries, call the `{object_id}_data` tool to retrieve data."
     (replace `{object_id}` with this node's slug, using underscores). Named after the
     data source (e.g., `org-directory`, `product-catalog`, `policy-store`).

     **Important:** Any node that must answer lookup queries (knowledge bases, employee
     directories, policy documents, ticket stores, etc.) is a `read_service`, even if
     it is also a write target. A `business_logic` node that needs factual external data
     not in the event payload must route to a `read_service`.

  3. **`write_service`** — an output-channel node. It records what it receives; its
     state is an audit trail. Initially empty state. Named after the output channel
     (e.g., `slack-notifications`, `airtable-records`, `email-delivery`).

  4. **`business_logic`** — a decision-making node. It embodies a specific domain:
     it knows the rules, applies them to incoming messages, and routes outputs to
     neighbors. Named as a domain noun (e.g., `approval-policy`, `triage-rules`,
     `routing-logic`). **Never** name a node "orchestrator", "manager",
     "coordinator", or any generic control-flow role.

  ### Edge semantics

  Each edge (u → v) means: node u is permitted to send messages to node v. Express
  this as v's id in u's `neighbors` list. The edge direction is always from sender
  to receiver.

  ### Mandatory checklist

  Before writing any nodes, answer these four questions:

  1. **What external systems send triggers, and how many distinct event types?**
     One `ingest_service` per distinct event type. Each must have at least one
     neighbor pointing to the `business_logic` node — without it, events dead-end.

  2. **What domain-specific decisions are required?**
     One `business_logic` node per domain. If the automation classifies, routes,
     approves, assigns, or enforces policy — it needs a `business_logic` node named
     after that domain.

  3. **What factual external data does the business logic need to look up?**
     One `read_service` per external data source not already in the event payload.
     If the data arrives in the trigger itself, no `read_service` is needed for it.

  4. **What external outputs does the automation produce?**
     One `write_service` per output channel (message sent, record written,
     notification triggered, ticket created).

  ### Node fields

  For each node, provide:

  1. `object_id` — slug format (lowercase, hyphens, e.g., `support-triage`)
  2. `node_type` — one of: `ingest_service`, `read_service`, `write_service`,
     `business_logic`
  3. `role` — one sentence: what is this node and what does it do
  4. `state_description` — what mutable state this node tracks at runtime.
     Empty string for `read_service` nodes (they hold no state).
  5. `behavior` — domain logic using when/then patterns. For `read_service` nodes,
     MUST end with: "When answering queries, call the `{object_id}_data` tool to
     retrieve data." Do NOT include routing instructions — neighbors handle that.

     **Fan-out rule:** When multiple neighbors must be notified simultaneously,
     describe them as a flat list: "Send to X, Y, and Z." Never use sequential
     confirmation language ("after X confirms", "once X replies") for `write_service`
     or notification neighbors.

     **Slack channel names:** If a `write_service` posts to Slack, name the exact
     channel (e.g., `#sales-alerts`), never a vague description.

  6. `neighbors` — list of node IDs this node sends messages to (directed edges).
     `ingest_service` nodes MUST list at least one neighbor.
  7. `tools` — list of external tool names this node calls directly (e.g.,
     `openai_generate_audio`, `slack_send_message`). `read_service` nodes list their
     `{object_id}_data` tool here. Omit if none.
  8. `skills` — purely internal capabilities requiring no external calls (e.g.,
     `calculate-totals`). Omit if none.
  9. `event_sources` — external triggers from outside the system boundary (e.g.,
     `webhook: record-created`, `external: ticket-submitted`). Only for
     `ingest_service` nodes.

  ### Validation checklist

  Before finalizing:
  - Every `ingest_service` node has at least one neighbor (no dead-ends)
  - Every `read_service` node's behavior ends with the `_data` tool call instruction
  - Business rules and domain policies are in `business_logic` nodes, NOT in
    `read_service` nodes
  - Every output action has a `write_service` node
  - At least one `business_logic` node exists if the automation makes any decisions
  - Every neighbor ID in every node's `neighbors` list exists in the output
  - No node is named "orchestrator", "manager", "coordinator", or "dispatcher"
