prompt: |
  # Task: Ground an Automation Template

  You are given an abstract automation template that contains placeholder language.
  Your ONLY job is to replace every abstract placeholder with a specific, concrete value.

  ---

  ## Template

  {TEMPLATE}

  ---

  ## Instructions

  Produce a grounded version of the template's steps by replacing every abstract placeholder with a specific value.

  **Replace these kinds of placeholders:**
  - "a designated channel" → a specific channel name (e.g., `#deals-emea`, `#support-escalations`)
  - "a team" → a specific team name (e.g., "Revenue Operations", "Enterprise Sales")
  - "a team member" → a specific role within the team (e.g., "Account Executive", "Sales Manager")
  - "your [anything]" → a specific name (e.g., "your CRM" → "Salesforce", "your task tracker" → "Jira")
  - "predefined options" or "a list of options" → list the actual options (e.g., "High, Medium, Low")
  - "X or Y" → pick one specific value
  - "a specific [thing]" → a concrete instance of that thing
  - Any other vague or generic reference → the specific concrete equivalent

  **De-Zapifying — the benchmark must not bake in Zapier-specific vocabulary.**
  Some templates were extracted from Zapier and use Zapier-platform terms.
  Replace them with concrete real-world equivalents. Pick a different system
  per workflow (don't always pick the same one) — diversity matters.

  - "Zapier Tables" / "Zapier Table" / "the Zapier Tables" → a specific named
    table or file in a specific product. ALWAYS include both the product AND
    the concrete artifact name (sheet name, table name, file name, base name).
    Pick a different product per workflow — variety matters.
    Examples (mix and match, vary the product across workflows):
      - "the `Leads-Q4` Airtable base, `New Submissions` table"
      - "the `crm.leads` table in Snowflake (schema `analytics`)"
      - "the `customer_intake.xlsx` Excel spreadsheet on SharePoint"
      - "the `Sales Pipeline` Google Sheet, tab `Active Deals`"
      - "the `support_tickets` Postgres table"
      - "the `inventory.csv` file on Google Drive"
      - "the `Orders 2026` Notion database"
      - "the `events` MongoDB collection in the `analytics` database"
      - "the `customer_events` BigQuery table in dataset `prod_warehouse`"
      - "the `audit_log` DynamoDB table"
    Use the same product+artifact consistently within ONE workflow's steps.
  - "Zapier Interfaces" / "Zapier Interface" → a specific form/portal product:
    pick one of `Typeform`, `Tally`, `Jotform`, `Webflow form`, `Google Forms`,
    `a custom React form`, `a Retool app`. Consistent within a workflow.
  - "Zapier Chatbot" → a specific chatbot product or surface: pick one of
    `Intercom bot`, `Drift bot`, `a custom Slack bot`, `Zendesk Answer Bot`.
  - "Zapier Canvas" → `the workflow diagram` (drop the brand reference;
    Canvas is just an internal visualization tool).
  - "a Zap" / "the Zap" / "another Zap" → DROP the word. A "Zap" in the
    template idiom just means "the next workflow step / the next automation
    handoff". Reword: "trigger a Zap that does X" → "the workflow step that
    does X is invoked"; "another Zap fires" → "the next automation step fires".
    Do NOT introduce a new actor named "Zap" into the grounded text.
  - The bare word "Zapier" (e.g., "uses Zapier to ...") → either drop it
    or replace with the chosen concrete product from the bullets above
    when it clearly refers to one of them.

  **Do not:**
  - Invent individual people's names unless the placeholder explicitly refers to a person
  - Add examples, parentheticals, or qualifications ("e.g.", "like", "such as")
  - Add steps that are not in the original
  - Remove steps from the original
  - Change the meaning or intent of any step
  - Add implementation details or technical specifics not implied by the template
  - Leave any Zapier-platform term in the grounded output

  **Output format:**
  - `name`: A concrete, specific name for this automation (update the template name if it contains placeholders; otherwise keep it as-is)
  - `domain`: Same as the template domain — do not change
  - `grounded_steps`: The same number of steps as the original `raw_steps`, with all placeholders replaced. One string per step.
