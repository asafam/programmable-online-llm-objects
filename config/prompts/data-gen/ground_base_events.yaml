prompt: |
  # Task: Map the state-scenario's placeholder entities to concrete values

  An earlier step authored a base scenario that exercises a CROSS-REQUEST INVARIANT, but it
  used PLACEHOLDER labels ("Rep #1", "Lead #2", "SKU #1", "Quote #1") because grounding had
  not happened yet. Your ONLY job is to choose a concrete, realistic value for EACH distinct
  placeholder. A downstream step substitutes them in by exact string match — so you do NOT
  rewrite the events, you only produce the mapping.

  ## Grounded scenario (for naming context)

  Name: {NAME}
  Domain: {DOMAIN}

  Grounded steps:
  {GROUNDED_STEPS}

  ## Base events (placeholders appear in these)

  {BASE_EVENTS}

  ## Rules
  - List EVERY distinct placeholder that appears anywhere in the events above — both named
    entities ("Rep #1", "Customer #2") and id-style labels ("Lead #1", "SKU #1", "Quote #1").
    Scan the inputs AND the expects.
  - Map each to ONE concrete, realistic value, used consistently:
      - people / accounts: "Rep #1" → "Maya Patel", "Customer #1" → "Northwind Bio"
      - id-style labels: "Lead #1" → "LF-2026-0417", "SKU #1" → "A100-XL", "Quote #1" → "Q-1001",
        "Order #1" → "ORD-5582"
  - Different placeholders → DIFFERENT concrete values. Define the COMPLETE cast: if the
    scenario references Rep #1..#3 and Lead #1..#10, map all of them.
  - Each `placeholder` must be the EXACT label as it appears in the text (e.g. "Rep #1",
    not "rep 1"), so string substitution matches.
  - Do NOT invent placeholders that don't appear. Do NOT map the same placeholder twice.

  Return `mappings`: a list of {placeholder, value} covering every placeholder in the events.
