prompt: |
  # Task: Write External Trigger Steps

  Given a concrete automation scenario and its object system, write the external trigger steps that start the automation.

  ---

  ## Automation

  **Name:** {NAME}

  **Scenario steps:**
  {GROUNDED_STEPS}

  ---

  ## Object System

  {OBJECTS}

  ---

  ## Instructions

  Steps are **external triggers only** — events that arrive from outside the system boundary and cause the automation to run. They are NOT a trace of the internal workflow.

  Once a trigger fires, the objects take over: each object's behavior and peer declarations determine what happens next automatically. Do not write steps for internal actions.

  **A "trigger" is an event that ARRIVES from outside, NOT a response
  that the workflow elicited.** When the workflow itself sends a Slack
  approval message or a request-for-input and then receives the answer
  back, that answer is **CASCADE** (part of the workflow's own flow),
  not a separate Step. Specifically:

  - Slack approval action arriving in response to a workflow-sent approval
    message → CASCADE, not a Step.
  - Slack reaction added in response to a workflow-posted message → CASCADE.
  - Exit interview confirmation arriving after the workflow scheduled it
    → CASCADE.
  - DocuSign signature returning after the workflow sent for signature
    → CASCADE.

  Only emit a Step when the external event is INITIATED from outside, not
  when it's a reply to something the workflow just sent. The general test:
  could this event arrive even if the workflow never ran? If yes → TRIGGER.
  If no (the event only happens because the workflow asked for it) → CASCADE.

  **Emit ONE Step per distinct external trigger in the scenario.** Many
  workflows have multiple external triggers — the initial event plus
  later ones. Don't stop after the first. Concretely:

  - Each **scheduled / time-based** trigger is its own Step
    (e.g., "after 2 days, the second email in the drip campaign fires"
    is a Step, separate from the prospect-added Step).
  - Each **periodic reminder** is its own Step
    (e.g., "on the employee's birthday each year" is a Step;
    "on the employee's work anniversary" is a separate Step).
  - Each **secondary user action** is its own Step
    (e.g., "a team member clicks Send" is a Step, separate from the
    customer's initial submission).
  - Each **external callback / response** is its own Step
    (e.g., "Facebook returns a conversion-upload result" is a Step,
    separate from the original Salesforce conversion event).

  If you only emit one Step for a workflow that has multiple distinct
  triggers, the benchmark cannot test the later triggers. Be explicit:
  one Step per trigger.

  ### Each step has these fields:

  - `target` — the `object_id` of the object that receives the external trigger. MUST be an object with a non-empty `event_sources` list.
  - `source` — the external system sending this trigger (e.g., `"webhook"`, `"__external__"`). Use the actual system name if known.
  - `text` — the natural language description of the trigger CLASS. Describe WHAT TYPE of event arrives and WHAT FIELDS it carries, using roles and field names — NOT specific instance values. Do not include quote IDs, person names, dollar amounts, dates, or any other concrete data values. Example: "A sales rep submits a new quote in HubSpot Quotes carrying the quote ID, submitting rep's identity and role, and the concession details (discount percentage, payment terms, add-ons)." — NOT "James Brown submits quote Q-2048 with 25% discount."
  - `expect` — what the system produces when run with no modifications:
    - `action` — an EXHAUSTIVE list of TERMINAL, externally-observable
      side effects the cascade produces. NOT a first-hop peer dispatch.

      Trace the object graph from the trigger object through peer
      declarations to the boundary of the system. List every effect
      across these categories:
        1. State changes in EXTERNAL named storage — rows inserted/updated,
           status fields flipped, counters incremented in a NAMED EXTERNAL
           system (Postgres table, Google Sheet tab, Airtable base, HubSpot
           object, Asana record, etc.). NOT internal LNL object NL state.
        2. Outbound messages / notifications (emails, Slack DMs/posts,
           SMS) — always include recipient + content summary.
        3. Tool / API invocations (Stripe charge, DocuSign create,
           OpenAI completion, Bitly shorten…) — include tool name + key args.
        4. File / artifact writes (uploads to Drive, S3, etc.).
        5. Any other externally observable effect named by the behaviors.

      Internal scratchpad state (e.g. "verification-request-processor state
      contains X", "follow-up-composition records the email preview") is
      NOT externally observable. Omit it — describe the real external
      output (Gmail draft created, ticket logged in Jira, row appended to
      Sheet) instead.

      If the cascade writes to two systems, list both. If it sends a
      notification AND updates a status AND invokes a tool, list all three.

      **Right shape (terminal outcomes with named destinations & data):**
        ✓ "A new row is appended to the `New Submissions` tab of the
           `Contact Intake` Google Sheet with Sarah Mitchell's name,
           email, phone, address; AND a new Google Contact for Sarah
           Mitchell is created with the same fields."
        ✓ "A Slack DM is sent to Maya Patel containing the KB article
           link; AND a row is appended to the helpdesk-events ClickUp
           table with the request payload and timestamp."

      **Wrong (first-hop peer dispatch — trivially passes):**
        ✗ "Submission data forwarded to the contact-verification peer."
        ✗ "Lead payload forwarded to lead-routing object for processing."
        ✗ "Full ticket payload forwarded to the sales-opportunity-qualifier."

      **Wrong (vague, no named destinations):**
        ✗ "A notification is sent to the team."
        ✗ "The data is stored in the database."

      Use **roles and field references, not instance values** — "approval-request email sent to the designated approvers" not "email sent to Maria Chen". Steps describe what the system DOES for any instance of this trigger class; concrete values (names, IDs, amounts) are supplied only at evaluation time via event payloads. Slack channel names from the object system's behavior descriptions are acceptable (they are structural, not instance data).

      Describe only natural-language messages and data writes — NOT
      interactive UI elements (buttons, dropdowns, forms, widgets). LNL
      objects communicate via natural language; they cannot produce
      interactive UI components.

      Use the SAME product/vendor names that the scenario uses. If the
      grounded scenario mentions Databricks, do NOT substitute BigQuery;
      if it mentions LinkedIn, do NOT substitute Meta or "online marketing
      platform" — keep the source vendor consistent with the scenario text.
    - `reason` — the rule(s) or peer-relationship path that drives the
      terminal outputs (one sentence)

  ### Rules

  **What IS a step:**
  - An external system creates a record that triggers the automation
  - An inbound message the system must act on
  - A scheduled or time-based trigger (heartbeat, daily check)

  **What is NOT a step** (internal — handled by object behavior and peers):
  - An object querying another object for data
  - An object sending a notification or downstream message
  - An object updating a record in response to another object
  - Any action that is a consequence of a prior step

  **Write one step per DISTINCT external trigger type.** A simple automation with one trigger type has one step. An automation that reacts to both a form submission AND a later webhook confirmation (different event types, different behavior chains) has two steps. Do not collapse independent triggers into one step; do not write multiple steps for different data instances of the same event type.

  **Consistency:** Names used in step `text` must be realistic and consistent — the pipeline will generate matching mock API data using these names.

  **Steps are templates, not instances.** The `text` describes the trigger class abstractly — what fields arrive, not what their values are. Concrete values (quote IDs, names, amounts, thread IDs) belong in Events, not Steps. A step that reads "A sales rep submits a quote with concession details" is correct; one that reads "James Brown submits quote Q-2048 with 25% discount" is wrong.

  **Shared state:** Steps run sequentially on a shared runtime. Each step's side effects carry forward. Before writing `expect` for any step N, ask: "Have prior steps already resolved the state this step depends on?" If yes, omit `expect` — the outcome is no longer deterministic. Omit `expect` entirely for scheduled/heartbeat triggers.
