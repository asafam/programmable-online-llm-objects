prompt: |
  # Task: Write per-Step expect.action (terminal-state outcomes)

  You are given a workflow whose Steps have `text` and `target` set, but
  whose `expect.action` / `expect.reason` fields need to be (re)written.

  Your job: for each Step, write `expect.action` as **the terminal,
  externally-observable state changes the cascade produces** — what the
  outside world can verify happened (rows written, emails sent, status
  fields updated, files created). NOT first-hop peer dispatches.

  Do NOT modify text/target/source. Do NOT add new steps. Only produce
  per-step expects.

  ---

  ## Automation

  **Name:** {NAME}

  **Scenario steps (template context):**
  {GROUNDED_STEPS}

  ---

  ## Object System

  {OBJECTS}

  ---

  ## Steps (text + target already set)

  {STEPS}

  ---

  ## What `expect.action` should look like

  **Terminal-state checks — exhaustive.** Trace the cascade and list
  EVERY observable side effect it produces. The eval judges what's
  externally verifiable, so an exhaustive list is what makes a Step
  testable.

  Categories to include — list every one that fires:

  1. **State changes in EXTERNAL named storage** — rows inserted/updated,
     status fields flipped, fields set on records, counters incremented
     in a NAMED EXTERNAL system: Postgres tables, Google Sheets tabs,
     Airtable bases, HubSpot/Salesforce objects, Asana/Jira/Linear
     records, Notion pages, etc.
     Example: "Order ORD-1042 status set to 'fulfilled' in the
     orders Postgres table."

     **DO NOT include internal LNL object NL state.** Workflow objects
     keep state as a scratchpad for orchestration, but it is NOT
     externally observable. Never demand things like
     "verification-request-processor state contains X" or
     "exit-survey-intake records the audit-trail" — replace with the
     real external effect (Gmail draft, Jira ticket, Sheet row, etc.).

  2. **Outbound messages / notifications** — emails sent, Slack DMs/posts,
     SMS, push notifications. Always include recipient + content summary.
     Example: "Email sent to maya.patel@acme.com with subject 'Welcome
     to Acme' and body containing onboarding checklist link."

  3. **Tool / API invocations** — calls to external systems (Stripe
     charge, DocuSign envelope create, OpenAI completion, Bitly shorten,
     etc.). Include the tool name + key args.
     Example: "Stripe `charges.create` invoked with customer_id
     'cus_8821', amount $4900, currency 'usd'."

  4. **File / artifact writes** — files uploaded to Drive, S3, etc.
     Example: "A PDF named 'invoice-1042.pdf' is uploaded to the
     `invoices/2026/Q2/` folder in Google Drive."

  5. **Any other externally observable effect** specifically named by the
     cascade's behaviors.

  - **NOT** "forwarded to peer X" / "dispatched to Y" / "sent to the next
    object" — those are intermediate peer-dispatch hops. Trivial to pass.
  - **YES** an exhaustive enumeration of categories 1-5 above for THIS
    trigger's cascade.

  If the cascade writes to two systems, list both. If it sends a
  notification AND updates a status AND invokes a tool, list all three.
  The benchmark exists to verify the agent produces EVERY required effect.

  **Right shape (terminal outcomes, named destinations):**
    ✓ "A new row is appended to the `New Submissions` tab of the `Contact
       Intake` Google Sheet with name 'Sarah Mitchell', email
       'sarah@example.com', phone, address; AND a new Google Contact
       entry for Sarah Mitchell is created with the same fields."
    ✓ "A Slack DM is sent to Maya Patel containing the KB article link;
       AND a row is appended to the `helpdesk-events` ClickUp table with
       the request payload and resolution timestamp."

  **Wrong (first-hop peer dispatch — trivial to pass):**
    ✗ "Lead payload forwarded to lead-routing object for processing."
    ✗ "Submission data forwarded to the contact-verification peer."
    ✗ "Full call payload forwarded to the sales-coaching-analyzer."

  **Wrong (internal LNL object state — not externally observable):**
    ✗ "follow-up-composition state records the generated email preview."
    ✗ "verification-request-processor state contains the request payload."
    ✗ "exit-survey-intake audit-trail stores the submission record."
    These are workflow-internal scratchpads — replace with the real
    external effect that resulted (Gmail draft, Jira ticket, Sheet row).

  **Wrong (vague, no named destinations or content):**
    ✗ "A notification is sent to the team."
    ✗ "The data is stored in the database."

  Describe natural-language messages and data writes only — NOT interactive
  UI elements. Use product/destination names exactly as they appear in
  the scenario / object behaviors (e.g. "HubSpot Quotes", "#deal-approvals").
  Do NOT include instance-specific values (quote IDs, person names, dollar
  amounts) — steps are templates; concrete values are supplied by events at
  evaluation time. Describe roles: "the designated approvers", "the
  submitting rep", "the required concession approver" — not "Maria Chen",
  "Q-2048", "25%".

  `expect.reason` is one sentence naming the cascade path from trigger to
  terminal output (e.g., "the contact-verification object validates the
  submission and dispatches to both contact-intake-sheet and
  google-contacts per its peer declarations").

  **Omit `expect` entirely (leave it null)** for scheduled / heartbeat /
  cron triggers where the outcome isn't deterministic at the trigger
  moment AND no terminal output can be expected (e.g., a daily check that
  finds nothing). If the schedule fires and the cascade has a terminal
  outcome (a digest gets posted), then expect it.

  ---

  ## Output

  Return strictly a JSON object matching this schema:
    {{
      "step_expects": [
        {{
          "step_index": 1,
          "action": "<terminal state changes the cascade produces, or null>",
          "reason": "<one-sentence cascade path explanation, or null>"
        }},
        ...
      ]
    }}

  Include one entry per Step, in the same order, using 1-based step_index.
