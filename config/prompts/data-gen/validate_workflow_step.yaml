prompt: |
  # Task: Validate Workflow Triggers (Steps) vs Template

  Our workflows are **event-triggered**: a `Step` is an *external trigger*
  that initiates the workflow (a form submission, a webhook arriving, a
  scheduled tick, a user UI action). The rest of what a template describes
  (DB writes, emails sent, status updates, downstream API calls) is the
  **cascade** — implemented by object behaviors + peer relationships, NOT
  by additional Steps.

  Your job:
  1. Classify each template `raw_step` as **TRIGGER** or **CASCADE**.
  2. For each workflow `Step`, decide whether it faithfully grounds one of
     the TRIGGER raw_steps. Cascade raw_steps are NOT the workflow Step's
     job — never penalise a workflow for "missing" a cascade step.
  3. Report any TRIGGER raw_step that has NO corresponding workflow Step
     (a missed trigger).
  4. Grade quality of each workflow Step independently.

  ---

  ## Source Template

  ID: {WORKFLOW_ID}
  Name: {WORKFLOW_NAME}
  Link: {LINK}

  ## Template raw_steps (numbered, 1-based)

  {RAW_STEPS}

  ## Workflow Steps (numbered, 1-based)

  {WORKFLOW_STEPS}

  ---

  ## How to classify a raw_step

  - **TRIGGER**: an external event that arrives at the workflow from
    outside — a form submission, a webhook delivery, a scheduled tick,
    a user clicking a button, a new lead arriving from an ad platform,
    a Slack message posted, a CRM record changing status, a returning
    response from an external system (e.g., an ad platform's upload-result
    callback). The defining property: the workflow doesn't decide when
    this happens; some external system or user does.
  - **CASCADE**: an action the workflow performs in response to a
    trigger — write a row, send an email, post to Slack, call an API,
    update an internal status. The defining property: this happens
    BECAUSE the workflow is running.

  ### Recognising implicit triggers — and avoiding double-classification

  Many templates describe an artefact ("Create a job posting page",
  "Set up an HR chatbot", "Maintain a leads database") without an explicit
  "X submits / clicks / asks" sentence. **Treat such a raw_step as a
  TRIGGER ONLY if no other raw_step in the same template describes the
  actual external arrival event.** Otherwise it's SETUP (CASCADE).

  - "Create a form" alone → TRIGGER (the submission is implicit).
  - "Create a form" + later "User submits the form" → SETUP/CASCADE on
    the first; TRIGGER on the second. Never both.
  - "Set up the chatbot to respond" alone → TRIGGER.
  - "Set up the chatbot" + later "Employee asks the chatbot" → CASCADE
    on the setup; TRIGGER on the asking.
  - "Trigger a Zap when a new row is added to the table" → CASCADE.
    The "Zap" here is fired by an INTERNAL state change (row insert) that
    a prior workflow step caused; it's not an externally-arriving event.
    The word "trigger" in this sentence describes the internal automation
    routing, not an external trigger event.
  - "Maintain a sales-rep table to assign leads" → CASCADE (state, not
    external event entering the system).
  - "Connect to Google Contacts" → CASCADE (outbound action).

  **Urgency / metadata annotations are not separate triggers.** A
  raw_step like "Employees can mark urgency levels for time-sensitive
  requests" describes a *modifier* on the user's primary submission
  action — it's part of the same trigger event, not a separate trigger.
  Classify these as CASCADE (or SETUP if it describes the UI capability).

  Also classify as TRIGGER:
  - External responses returning to the workflow (e.g., "Facebook
    confirms a conversion upload", "DocuSign returns a completed
    signature event", "Salesforce emits a Closed Won record").
  - Time-based events ("Every Monday at 9am", "after the configured
    delay", "weekly cron").

  When a template has zero TRIGGER raw_steps under the strict definition
  but has an artefact whose purpose is to receive input, classify the
  most natural artefact raw_step as TRIGGER. A workflow always has at
  least one external entry.

  A single template will typically have 1-3 TRIGGERS and the rest CASCADE.

  ## How to grade each workflow Step's fidelity

  For each workflow Step:
  - Find the TRIGGER raw_step it most plausibly grounds. Record its
    1-based `aligned_to` index, or `null` if no TRIGGER fits.
  - Grade the alignment:
    - **FAITHFUL** — the Step grounds the matched TRIGGER raw_step
      accurately (concrete payload, plausible source, matches what would
      arrive from that real-world trigger).
    - **DRIFTED** — the Step is recognisable as that trigger but has
      meaningful detail shifts (wrong actor, missing data, different
      reasonable interpretation).
    - **WRONG** — the Step grounds a CASCADE raw_step (Steps must only be
      triggers; cascading actions belong in object behavior), OR fabricates
      a trigger not in the template, OR contradicts the matched trigger.
  - If `aligned_to` is `null` and the Step looks like it tries to ground
    a cascade or made-up event → **WRONG**.

  ## How to grade quality (independent of fidelity)

  - **GOOD** — concrete realistic values everywhere; single observable
    outcome in expect.action; actors named (not "the system").
  - **ADEQUATE** — readable, minor vague phrases.
  - **POOR** — placeholders, fake product names, bundled multi-outcome
    expect.action, "the system" hand-waving.

  ## How to report missed triggers

  After classifying all raw_steps as TRIGGER/CASCADE, list every TRIGGER
  raw_step that is NOT covered by any workflow Step.

  ## Output

  Return strictly a JSON object matching this schema:
    {{
      "raw_step_classifications": [
        {{"index": 1, "classification": "TRIGGER" | "CASCADE"}},
        ...
      ],
      "step_judgements": [
        {{
          "workflow_step_index": 1,
          "aligned_to": <1-based index of matched TRIGGER raw_step, or null>,
          "verdict": "FAITHFUL" | "DRIFTED" | "WRONG",
          "reasoning": "<1-2 sentences>",
          "quality": "GOOD" | "ADEQUATE" | "POOR",
          "quality_issues": ["<short complaint>", ...]
        }},
        ...
      ],
      "missed_triggers": [
        {{"index": <1-based template raw_step index>, "raw_step": "<text>"}},
        ...
      ]
    }}

  Include one entry in `raw_step_classifications` per template raw_step.
  Include one entry in `step_judgements` per workflow Step, in workflow order.
  `missed_triggers` may be empty if every TRIGGER raw_step is covered.
