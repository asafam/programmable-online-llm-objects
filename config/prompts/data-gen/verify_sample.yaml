user_prompt: |
  You are a strict reviewer of a generated TEST CASE for a state-invariant automation workflow.
  Decide if it is READY for human annotation, or if it has problems a reviewer would reject. Judge
  ONLY against the rubric below (these are the exact issues reviewers have repeatedly flagged).

  ## The sample
  {SAMPLE}

  ## Rubric — flag an issue if ANY of these fail
  1. FIDELITY: the base scenario must exercise the invariant the way the WORKFLOW STEPS describe.
     If the steps say a distinct actor performs the gated action (e.g. an approver approves in
     Slack; there is NO auto-approval), the events MUST route through that actor — not "the system
     auto-approves". The gated action must be the workflow's REAL action (reorder / assign / approve).
  2. ACTOR CHAIN CLARITY: if there is a submit→approve (or request→handler) chain, BOTH actors must
     be named — the submitter (sales rep) AND the approver (their manager) — so the chain is clear.
  3. SEED COMPLETENESS: the seed (initial reference state) must contain every entity the scenario
     reads — the full roster (reps + positions + caps), the catalog (SKUs + reorder levels), the
     approvers AND who they manage. A scenario that names an entity absent from the seed is wrong.
  4. PER-KEY GENERALIZATION: for a per-key limit (per SKU, per rep), the scenario should show the
     limit is PER KEY — e.g. one SKU hits its limit while a SECOND SKU is still allowed. A limit
     applied to the whole collection (global) is wrong.
  5. EVENTS ARE PURE STIMULI: an event `input` is the external request only — it must NOT state the
     system's internal/accumulated state (current inventory quantity, roster, running counts).
  6. EXPECTS ARE OUTCOME-CORRECT & CLEAR: each expect states the GATED ACTION's outcome (taken vs
     blocked/held) with a reason tied to the accumulated state. For a cap breach, the actor still
     ACTS but the system HOLDS it (not "the actor does not act"). No off-by-one (an in-limit request
     must NOT be blocked; an over-limit one MUST be).
  7. MODIFICATION EXERCISES THE NEW RULE: the modification must change the threshold and the
     post-modification events must contain a FLIP — an outcome allowed under the new rule that was
     blocked under the old (e.g. a 3rd lead/day allowed after the cap is raised to 3). It must NOT
     collide with the base (same key within the same rolling window; same timestamps).
  8. NO LEAKAGE / NO META: the read-service mock data must be reference state only (no assignments,
     outcomes, or running counts baked in). Do NOT flag the natural business RULE stated as a step
     (e.g. "approved discounts must not exceed the quarterly cap") — that is the invariant baked into
     the steps and is EXPECTED. Only flag the literal meta-label "State constraint" used as a heading.
  9. SCALE: the roster/catalog should be MINIMAL (2-3 entities), not a large cast that floods traffic.

  Return JSON: {"passed": bool, "issues": [<one short specific string per problem, citing the
  event id / field>]}. passed=true ONLY if issues is empty. Be specific and terse; do not invent
  problems that aren't there.
