heartbeat:
  enabled: true
  interval_seconds: 30
  # Wall-clock seconds to wait for a pending reply before giving up.
  # Independent of heartbeat frequency — changing interval_seconds does not affect this.
  pending_timeout_seconds: 90

react_cross_objects: true

limits:
  # Maximum ReAct tool-call steps within a single object invocation (per-frame depth)
  max_tool_rounds: 8
  # Maximum message hops across objects — equivalent to call-stack depth
  max_chain_depth: 10
  # Messages kept in each object's history window
  max_history: 6

knowledge_gaps:
  # When an object signals knowledge_gap, automatically record it in state.
  enabled: false
  # Also auto-ask all declared peers if they know the answer.
  ask_peers: false

# Planner mode controls how the pre-execution planner shapes its output and
# how the executor dispatches steps.
#   dag (default) — planner emits a dependency graph; the executor fans out
#                   all ready steps (empty depends_on or all deps done) in a
#                   single turn. Faster when behaviors notify/write to
#                   multiple peers that don't consume each other's results.
#   sequential    — planner emits steps that the executor handles one per
#                   turn. Use for reproducibility against historical runs or
#                   when plans are pure chains.
# Only consulted when enable_planner is true.
planner_mode: dag

# Replan checkpoints (default off). When true, the planner may emit
# `kind: replan` steps that hand control back to the planner mid-cascade
# once their `depends_on` step results land. The runtime invokes the
# planner again with the original event + completed step results, and the
# planner emits continuation steps (appended via add_steps). Use for
# workflows where a downstream decision genuinely depends on a value the
# planner couldn't see at first-plan time (stock level, authorization,
# returned id). Budget-capped per trace to prevent runaway recursion.
enable_replan_checkpoints: false
replan_max_per_trace: 3

# Reactive step-retry + replan (default off). When true, the runtime counts how
# many times each PlanStep gets invalidated by the post-execution evaluator
# (step.retry_count). If a step's retry_count crosses step_max_retries, the
# runtime synthesizes a kind=replan step targeting it — reusing the same
# planner-reentry machinery as enable_replan_checkpoints, but triggered
# reactively from repeated failure rather than from a planner-pre-declared
# checkpoint. If that synthesized replan itself exhausts (planner failure or
# step_replan_max reached for that step), the originating step is marked
# failed and the plan's status flips to "failed" so the trace concludes
# gracefully. Independent of enable_replan_checkpoints — safe to enable
# either, both, or neither.
enable_step_retry_replan: false
step_max_retries: 2
step_replan_max: 1
reactive_replan_max_per_trace: 4  # total synthetic replans per trace; prevents plan explosion
